<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Аудио-реактивная нейросеть 2.7 (Neural Wave Edition)</title>
  <style>
    /* стили без изменений */
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 50% 50%, #07111f 0%, #020305 55%, #000 100%);
      font-family: Segoe UI, Roboto, Arial, sans-serif;
      color: #eef7ff;
    }
    body { display: grid; place-items: center; }

    .frame {
      position: relative;
      width: min(96vw, 1600px);
      aspect-ratio: 16 / 10;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
      background:
        radial-gradient(circle at 50% 50%, rgba(90,140,255,0.08), transparent 45%),
        linear-gradient(180deg, #04070b 0%, #020305 100%);
      box-shadow:
        0 30px 80px rgba(0,0,0,0.65),
        0 0 120px rgba(20,40,80,0.2),
        inset 0 0 40px rgba(255,255,255,0.02);
    }

    canvas {
      display: block;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
      will-change: transform, filter;
    }

    #bg { z-index: 0; }
    #art { z-index: 1; cursor: crosshair; }

    .btn {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(240,247,255,0.92);
      background: rgba(5, 8, 14, 0.34);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, opacity 160ms ease;
      margin-top: 30px;
    }
    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(190,220,255,0.16);
      background: rgba(9, 13, 22, 0.44);
    }
    .btn:active { transform: scale(0.985); }
    .btn:disabled { opacity: 0.76; cursor: wait; }
    .btn-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: rgba(120, 185, 255, 0.96);
      box-shadow: 0 0 10px rgba(120,185,255,0.42);
      flex: 0 0 auto;
    }

    .hud {
      position: absolute;
      left: 18px;
      bottom: 18px;
      z-index: 2;
      display: grid;
      gap: 10px;
      pointer-events: none;
      user-select: none;
    }

    .hud > * {
      pointer-events: auto;
    }

    .hud-row {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      padding: 10px 14px;
      border-radius: 16px;
      background: rgba(4, 8, 16, 0.34);
      border: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.22);
    }

    .hud-brand {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(236,244,255,0.92);
      font-weight: 700;
    }

    .hud-chip {
      min-width: 72px;
      text-align: center;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
      background: linear-gradient(135deg, rgba(28, 39, 62, 0.72), rgba(52, 126, 255, 0.18));
      border: 1px solid rgba(255,255,255,0.08);
    }

    .hud-note {
      width: fit-content;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 11px;
      color: rgba(236,244,255,0.74);
      background: rgba(4, 8, 16, 0.24);
      border: 1px solid rgba(255,255,255,0.04);
      backdrop-filter: blur(8px);
      letter-spacing: 0.02em;
    }
    .hud > :last-child {
        margin-bottom: 50px;
    }
    .tune-panel {
      display: grid;
      gap: 9px;
      width: min(280px, 42vw);
      padding: 12px;
      border-radius: 18px;
      background: rgba(4, 8, 16, 0.28);
      border: 1px solid rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.18);
    }

    .tune-title {
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(236,244,255,0.72);
      font-weight: 700;
    }

    .tune-row {
      display: grid;
      gap: 5px;
    }

    .tune-row label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(236,244,255,0.72);
    }

    .tune-row output {
      color: rgba(255,255,255,0.96);
      font-variant-numeric: tabular-nums;
    }

    .tune-row input[type="range"] {
      width: 100%;
      appearance: none;
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(120,185,255,0.24), rgba(255,255,255,0.08));
      outline: none;
    }

    .tune-row input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(230, 245, 255, 0.96);
      box-shadow: 0 0 0 4px rgba(120,185,255,0.15);
      cursor: pointer;
    }

    .tune-row input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(230, 245, 255, 0.96);
      box-shadow: 0 0 0 4px rgba(120,185,255,0.15);
      cursor: pointer;
    }

    .band-legend {
      display: grid;
      gap: 8px;
      width: fit-content;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(4, 8, 16, 0.26);
      border: 1px solid rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.18);
    }

    .band-item {
      display: grid;
      gap: 5px;
      min-width: 168px;
    }

    .band-label {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(236,244,255,0.72);
    }

    .band-meter {
      position: relative;
      display: block;
      height: 5px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.04);
    }

    .band-meter i {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      transform-origin: left center;
      background: linear-gradient(90deg, rgba(120,185,255,0.45), rgba(255,255,255,0.92));
      box-shadow: 0 0 12px rgba(120,185,255,0.22);
    }

    .band-item[data-band="bass"] .band-meter i {
      background: linear-gradient(90deg, rgba(255,255,255,0.18), rgba(90, 160, 255, 0.92));
    }
    .band-item[data-band="mid"] .band-meter i {
      background: linear-gradient(90deg, rgba(255,255,255,0.18), rgba(130, 210, 255, 0.92));
    }
    .band-item[data-band="high"] .band-meter i {
      background: linear-gradient(90deg, rgba(255,255,255,0.18), rgba(190, 235, 255, 0.98));
    }

    .dev-panel {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 5;
      width: min(420px, 38vw);
      max-height: calc(100% - 36px);
      overflow: auto;
      pointer-events: auto;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .dev-panel.hidden {
      opacity: 0;
      transform: translateY(-8px) scale(0.985);
      pointer-events: none;
    }

    .dev-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .dev-subtitle {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(236,244,255,0.62);
      margin-top: 4px;
    }

    .dev-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.06);
      color: rgba(245,250,255,0.94);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .dev-btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.09);
      border-color: rgba(190,220,255,0.16);
    }

    .dev-grid {
      display: grid;
      gap: 10px;
      max-height: 70vh;
      overflow: auto;
      padding-right: 4px;
    }

    .dev-section {
      display: grid;
      gap: 10px;
      padding-bottom: 10px;
      margin-bottom: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .dev-section:last-child {
      border-bottom: 0;
      padding-bottom: 0;
      margin-bottom: 0;
    }

    .dev-section-title {
      font-size: 10px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: rgba(190,220,255,0.78);
      font-weight: 700;
      padding: 4px 0 0;
    }

    .dev-row {
      display: grid;
      gap: 6px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .dev-row:last-child { border-bottom: 0; }

    .dev-row label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(236,244,255,0.72);
    }

    .dev-hint {
      font-size: 9px;
      line-height: 1.35;
      letter-spacing: 0.01em;
      color: rgba(236,244,255,0.56);
      font-family: inherit;
      margin-top: -2px;
    }

    .dev-value {
      color: rgba(255,255,255,0.96);
      font-variant-numeric: tabular-nums;
    }

    .dev-inputs {
      display: grid;
      grid-template-columns: 1fr 84px;
      gap: 8px;
      align-items: center;
    }

    .dev-inputs input[type="range"],
    .dev-inputs input[type="number"] {
      width: 100%;
      appearance: none;
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(120,185,255,0.24), rgba(255,255,255,0.08));
      outline: none;
    }

    .dev-inputs input[type="number"] {
      height: auto;
      padding: 6px 8px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: rgba(245,250,255,0.94);
      font-size: 11px;
      letter-spacing: 0.02em;
    }

    .dev-inputs input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(230, 245, 255, 0.96);
      box-shadow: 0 0 0 4px rgba(120,185,255,0.15);
      cursor: pointer;
    }

    .dev-inputs input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(230, 245, 255, 0.96);
      box-shadow: 0 0 0 4px rgba(120,185,255,0.15);
      cursor: pointer;
    }

    .screen-control {
      position: relative;
      z-index: 4;
      width: min(360px, 46vw);
      padding: 12px 14px 11px;
      border-radius: 18px;
      background: rgba(4, 8, 16, 0.42);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.18);
      display: grid;
      gap: 8px;
      pointer-events: auto;
      user-select: none;
      touch-action: none;
    }

    .screen-control-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(236,244,255,0.74);
      font-weight: 700;
    }

    .screen-control-head output {
      color: rgba(255,255,255,0.96);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.08em;
    }

    .screen-control input[type="range"] {
      width: 100%;
      appearance: none;
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(120,185,255,0.24), rgba(255,255,255,0.08));
      outline: none;
      cursor: pointer;
    }

    .screen-control input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(230, 245, 255, 0.96);
      box-shadow: 0 0 0 4px rgba(120,185,255,0.15);
      cursor: pointer;
    }

    .screen-control input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(230, 245, 255, 0.96);
      box-shadow: 0 0 0 4px rgba(120,185,255,0.15);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="frame">
    <canvas id="bg"></canvas>
    <canvas id="art"></canvas>
    <button class="btn" id="btn" title="Подключить звук системы"><span class="btn-dot"></span><span>CONNECT</span></button>

    <div class="hud">
      <div class="hud-row">
        <span class="hud-brand">AUDIO REACTIVE</span>
        <span class="hud-chip" id="hudDrop">LIVE</span>
      </div>
      <div class="band-legend">
        <div class="band-item" data-band="bass">
          <span class="band-label">BASS</span>
          <span class="band-meter"><i id="meterBass"></i></span>
        </div>
        <div class="band-item" data-band="mid">
          <span class="band-label">MID</span>
          <span class="band-meter"><i id="meterMid"></i></span>
        </div>
        <div class="band-item" data-band="high">
          <span class="band-label">HIGH</span>
          <span class="band-meter"><i id="meterHigh"></i></span>
        </div>
      </div>
      <div class="hud-note">Wheel - drop · F2 - developer panel</div>
      <div class="screen-control" id="calmControl">
        <div class="screen-control-head">
          <span>Motion Smoothness</span>
          <output id="calmValue">55%</output>
        </div>
        <input id="calmSlider" type="range" min="0" max="100" value="55" />
      </div>
    </div>
  </div>

  <div class="tune-panel dev-panel hidden" id="devPanel">
    <div class="dev-head">
      <div>
        <div class="tune-title">Developer panel</div>
        <div class="dev-subtitle">F2 · live variables · manual override</div>
      </div>
      <button class="dev-btn" id="devReset" type="button">Reset</button>
    </div>
    <div class="dev-grid" id="devGrid"></div>
  </div>

  <script>
    const CONFIG = {
      linkNearPriority: 2.08,
      linkBaseCount: 32,
      linkAudioBoost: 65,
      linkMinAlpha: 0.01,
      linkEnergyAlphaBoost: 0.52,
      linkBaseWidth: 0.32,
      linkEnergyWidthBoost: 1.0,
      linkBendFactor: 0.24,
      linkSurvivalThreshold: 0.009,
      linkScoreEnergyWeight: 0.72,
      linkSameClusterBonus: 0.12,
      linkDiffClusterBonus: 0.11,
      linkAudioComboBonus: 0.26,

      speedBase: 0.34,
      speedEnergyMult: 3.0,
      chainSpread: 0.66,
      calmness: 0.55,
      idleNodeWander: 3.1,
      idleLinkBreath: 0.24,
      beatKickThreshold: 0.28,
      beatKickRise: 0.05,
      trebleSnareThreshold: 0.22,

      nodeBaseRadius: 4.2,
      nodeEnergyRadiusBoost: 2.4,
      nodeGlowBaseMult: 0.6,
      nodeGlowAudioBoost: 3.4,
      nodeGlowBreathRange: 2.45,
      maxNodes: 50,
      bassNodes: 11,
      vocalNodes: 11,
      trebleNodes: 13,

      gridCellSize: 100,
      gridWaveIntensity: 20,
      gridOpacity: 0.085,

      wavefrontSpeed: 12.0,
      wavefrontAlpha: 0.2,
      wavefrontWidth: 170,
      wavefrontGlow: 0.35,

      rippleSpeed: 11.0,
      rippleEnergyBoost: 16.0,
      rippleAlpha: 0.66,
      rippleDecay: 0.013,
      rippleMaxR: 1.52,
      rippleMouseScale: 1.0,
      rippleMouseAlpha: 1.0,

      saluteFrequency: 0.4,  
      waveFrequency: 0.1,

      smallParticleCount: 100,
      smallParticleSpeed: 0.06,
      smallParticleAudioReactive: 0.02,
      largePulseSpeed: 0.0032,
      redDropMix: 0.92
    };

    const CONFIG_DEFAULTS = JSON.parse(JSON.stringify(CONFIG));

    const bgCanvas = document.getElementById('bg');
    const bgCtx = bgCanvas.getContext('2d', { alpha: false });
    const canvas = document.getElementById('art');
    const ctx = canvas.getContext('2d');
    const btn = document.getElementById('btn');
    const hudDrop = document.getElementById('hudDrop');
    const meterBass = document.getElementById('meterBass');
    const meterMid = document.getElementById('meterMid');
    const meterHigh = document.getElementById('meterHigh');
    const devPanel = document.getElementById('devPanel');
    const devGrid = document.getElementById('devGrid');
    const devReset = document.getElementById('devReset');
    const calmControl = document.getElementById('calmControl');
    const calmSlider = document.getElementById('calmSlider');
    const calmValue = document.getElementById('calmValue');

    let width = 0, height = 0, dpr = Math.min(window.devicePixelRatio || 1, 1.25);
    let audioEnabled = false, audioCtx, analyser, source, freqData = null, mediaStream = null;

    let nodes = [], links = [], pulses = [], particles = [], bursts = [], ripples = [], beatBridges = [], floatingTexts = [], wavefronts = [], currentChains = [];
    let nodeCounter = 0;
    let linkMemory = new Map();
    let frameCount = 0;

    let time = 0;
    let globalHueOffset = 0;
    let breakdownTarget = 0;
    let breakdownIntensity = 0;
    let globalSpeedMult = 1;
    let kickTimer = 0, snareTimer = 0;
    let flash = 0, cssFilterPulse = 0;
    let lastBass = 0, lastTreble = 0;
    let longTermEnergy = 0.1;
    let mouse = { x: -1000, y: -1000, active: false };
    let backgroundOrbs = [
      { x: 0.18, y: 0.32, r: 0.42, speed: 0.00052, angle: 0 },
      { x: 0.82, y: 0.68, r: 0.5, speed: 0.00076, angle: 2.2 },
      { x: 0.5, y: 0.5, r: 0.62, speed: 0.00042, angle: 4.1 }
    ];

    const clamp01 = v => Math.max(0, Math.min(1, v));
    const mix = (a, b, t) => a + (b - a) * t;
    const smoothstep = (edge0, edge1, x) => {
      const t = clamp01((x - edge0) / (edge1 - edge0 || 1));
      return t * t * (3 - 2 * t);
    };
    const hash01 = (str) => {
      let h = 2166136261;
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return ((h >>> 0) % 1000000) / 1000000;
    };
    const pairKey = (a, b) => {
      const ia = parseInt(a.id.split('-')[1], 10);
      const ib = parseInt(b.id.split('-')[1], 10);
      return ia < ib ? `${ia}:${ib}` : `${ib}:${ia}`;
    };

    function clampRange(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function getXColor(x) {
      const ratio = width > 0 ? Math.max(0, Math.min(1, x / width)) : 0.5;
      const baseHue = (globalHueOffset + 185 + ratio * 200) % 360;
      const redMix = Math.min(1, breakdownIntensity * breakdownIntensity * CONFIG.redDropMix);
      return baseHue * (1 - redMix) + 355 * redMix;
    }

    function getLinkVisuals(a, b, strength, energy, scaleCombo, whiteMask = 0) {
      const dist = Math.hypot(b.x - a.x, b.y - a.y) || 1;
      const maxDist = Math.hypot(width, height) * 0.65;
      const proximity = Math.max(0, 1 - dist / maxDist);
      const distanceWeight = Math.pow(proximity, 3.5);

      const whiteBlend = smoothstep(0.82, 0.995, breakdownIntensity) * whiteMask;
      const alpha = Math.max(CONFIG.linkMinAlpha, distanceWeight * 1.02 + strength * 0.10 + energy * CONFIG.linkEnergyAlphaBoost) * scaleCombo;
      const boostedAlpha = alpha * (1 + whiteBlend * 0.48 + breakdownIntensity * 0.12);

      const hueA = getXColor(a.x);
      const hueB = getXColor(b.x);

      let avgHue;
      if (Math.abs(hueA - hueB) > 180) {
        avgHue = (hueA + hueB + 360) / 2 % 360;
      } else {
        avgHue = (hueA + hueB) / 2;
      }

      return { alpha: boostedAlpha, hue: avgHue, proximity, whiteBlend };
    }

    function getBandVolumeHz(array, lowHz, highHz, tilt = 0) {
      const sampleRate = audioCtx ? audioCtx.sampleRate : 48000;
      const nyquist = sampleRate / 2;
      const binHz = nyquist / array.length;
      const start = Math.max(0, Math.floor(lowHz / binHz));
      const end = Math.max(start + 1, Math.min(array.length, Math.ceil(highHz / binHz)));
      let sum = 0;
      let weightSum = 0;
      for (let i = start; i < end; i++) {
        const position = (i - start) / Math.max(1, end - start - 1);
        const weight = 1 + tilt * (position * 2 - 1);
        sum += array[i] * weight;
        weightSum += weight;
      }
      return (sum / Math.max(weightSum, 0.0001)) / 255;
    }

    function updateHudBands(bass, vocal, treble) {
      const smooth = v => Math.max(0, Math.min(1, v));
      if (meterBass) meterBass.style.width = `${smooth(bass) * 100}%`;
      if (meterMid) meterMid.style.width = `${smooth(vocal) * 100}%`;
      if (meterHigh) meterHigh.style.width = `${smooth(treble) * 100}%`;
    }

    const BAND_BINS = {
      bass: [24, 180],
      vocal: [180, 3200],
      treble: [3200, 12000],
      air: [12000, 18000]
    };

    const BAND_TILT = {
      bass: -0.15,
      vocal: 0.18,
      treble: 0.34,
      air: 0.48
    };

    const BAND_RESPONSE = {
      bass: 1.0,
      vocal: 1.22,
      treble: 1.45,
      air: 0.92
    };

    const BAND_HISTORY = {
      bass: { fast: 0.08, slow: 0.08 },
      vocal: { fast: 0.06, slow: 0.06 },
      treble: { fast: 0.05, slow: 0.05 },
      air: { fast: 0.04, slow: 0.04 }
    };

    function shapeBand(name, raw) {
      const state = BAND_HISTORY[name];
      const gain = BAND_RESPONSE[name] || 1;
      const tilt = BAND_TILT[name] || 0;

      state.fast = mix(state.fast, raw, 0.20);
      state.slow = mix(state.slow, raw, 0.03);

      const floor = Math.min(state.slow * 0.92, state.fast * 0.74 + 0.002);
      const ceiling = Math.max(state.fast * (1.12 + Math.max(0, tilt) * 0.15), state.slow * 1.45, floor + 0.04);
      const t = clamp01((raw - floor) / Math.max(ceiling - floor, 0.0001));
      return clamp01(Math.pow(t, 0.82 - Math.max(0, tilt) * 0.12) * gain);
    }

    function getBandProfile(kind) {
      return BAND_PROFILES[kind] || BAND_PROFILES.vocal;
    }

    function getNodeSignal(kind, bass, vocal, treble) {
      const p = getBandProfile(kind);
      return clamp01(bass * p.bass + vocal * p.vocal + treble * p.treble);
    }

    const BAND_PROFILES = {
      bass: { bass: 0.72, vocal: 0.22, treble: 0.06, pan: -0.76, spread: 0.82 },
      vocal: { bass: 0.18, vocal: 0.64, treble: 0.18, pan: 0.0, spread: 0.58 },
      treble: { bass: 0.06, vocal: 0.22, treble: 0.72, pan: 0.76, spread: 0.82 }
    };

    const STRUCTURAL_FIELDS = new Set(['maxNodes', 'bassNodes', 'vocalNodes', 'trebleNodes']);

    function syncPanelSectionValues(row, value, step) {
      const output = row.querySelector('output');
      const range = row.querySelector('.dev-range');
      const number = row.querySelector('.dev-number');
      const shown = (step < 0.01 ? value.toFixed(3) : step < 0.1 ? value.toFixed(2) : Number.isInteger(value) ? String(value) : value.toFixed(1));
      if (output) output.textContent = shown;
      if (range) range.value = String(value);
      if (number) number.value = String(value);
    }

    function syncCalmnessUI(value) {
      const v = clampRange(Number(value) || 0, 0, 100);
      CONFIG.calmness = v / 100;
      if (calmSlider) calmSlider.value = String(Math.round(v));
      if (calmValue) calmValue.textContent = `${Math.round(v)}%`;
      try { localStorage.setItem('eqCalmness', String(v)); } catch (e) {}
    }

    const storedCalmness = (() => {

      }
    })();
    syncCalmnessUI(storedCalmness);

    function getCalmProfile() {
      const calm = clamp01(CONFIG.calmness ?? 0.55);
      const calmBoost = 1 - Math.pow(1 - calm, 4.4);
      return {
        calm,
        calmBoost,
        speedMult: mix(1.55, 0.10, calmBoost),
        idleWander: mix(1.35, 0.04, calmBoost),
        idleBreath: mix(1.15, 0.07, calmBoost),
        noise: mix(1.45, 0.03, calmBoost),
        swirl: mix(1.28, 0.10, calmBoost),
        wave: mix(1.22, 0.08, calmBoost),

        waveVisibility: mix(1.0, 0.2, calmBoost),
        waveSpeedMult: mix(1.0, 0.4, calmBoost),
        waveSpawnChance: mix(1.0, 0.25, calmBoost) * CONFIG.waveFrequency,

        rippleSpeedMult: mix(1.0, 0.84, calmBoost),

    function buildDevPanel() {
      if (!devGrid) return;

      const sections = [
        { title: 'Links', keys: ['linkNearPriority', 'linkBaseCount', 'linkAudioBoost', 'linkMinAlpha', 'linkEnergyAlphaBoost', 'linkBaseWidth', 'linkEnergyWidthBoost', 'linkBendFactor'] },
        { title: 'Motion', keys: ['speedBase', 'speedEnergyMult', 'chainSpread', 'idleLinkBreath'] },

        { title: 'Ripples / waves', keys: ['saluteFrequency', 'rippleSpeed', 'rippleEnergyBoost', 'rippleAlpha', 'rippleDecay', 'rippleMaxR', 'rippleMouseScale', 'rippleMouseAlpha'] }
      ];

      const fieldByKey = new Map();
      for (const field of DEV_FIELDS) fieldByKey.set(field.key, field);

      devGrid.innerHTML = sections.map(section => {
        const sectionRows = section.keys.map((key) => {
          const field = fieldByKey.get(key);
          if (!field) return '';
          const initial = field.target[key];
          const shown = Number.isInteger(initial) ? String(initial) : String(Number(initial).toFixed(field.step < 0.01 ? 3 : field.step < 0.1 ? 2 : 1));
          return `
            <div class="dev-row" data-field="${field.key}">
              <label><span>${field.label}</span><output class="dev-value">${shown}</output></label>
              <div class="dev-hint">${field.hint}</div>
              <div class="dev-inputs">
                <input class="dev-range" type="range" min="${field.min}" max="${field.max}" step="${field.step}" value="${shown}" />
                <input class="dev-number" type="number" min="${field.min}" max="${field.max}" step="${field.step}" value="${shown}" />
              </div>
            </div>`;
        }).join('');
        return `
          <div class="dev-section" data-group="${section.title}">
            <div class="dev-section-title">${section.title}</div>
            ${sectionRows}
          </div>`;
      }).join('');

      devGrid.querySelectorAll('.dev-row').forEach((row) => {
        const key = row.dataset.field;
        const field = fieldByKey.get(key);
        if (!field) return;
        const range = row.querySelector('.dev-range');
        const number = row.querySelector('.dev-number');
        const commit = (raw) => {
          let value = Number(raw);
          if (!Number.isFinite(value)) return;
          value = clampRange(value, field.min, field.max);
          if (field.step >= 1 || Number.isInteger(field.step)) value = Math.round(value);
          field.target[key] = value;
          syncPanelSectionValues(row, value, field.step);
          if (STRUCTURAL_FIELDS.has(key) && nodes.length) buildScene();
        };
        const initial = field.target[key];
        if (range) range.addEventListener('input', e => commit(e.target.value));
        if (number) number.addEventListener('input', e => commit(e.target.value));
        if (range) range.value = String(initial);
        if (number) number.value = String(initial);
        commit(initial);
      });
    }
