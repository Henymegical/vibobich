<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Аудио-реактивная нейросеть (Dynamic Hue & FX)</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      /* Убрал жесткий градиент, чтобы холст задавал атмосферу */
      background: #000;
      font-family: Segoe UI, Roboto, Arial, sans-serif;
      color: #e8f4ff;
    }
    body { display: grid; place-items: center; }
    
    .frame {
      position: relative;
      width: min(96vw, 1600px);
      aspect-ratio: 16 / 10;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 90px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(255,255,255,0.03);
      background: #000;
    }
    
    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    #bg { z-index: 0; }
    
    #art { 
      z-index: 1; 
      cursor: crosshair;
      transform: translateZ(0); 
      will-change: filter, transform;
    }

    .btn {
      position: absolute;
      inset: 0;
      z-index: 2;
      margin: auto;
      width: fit-content;
      height: fit-content;
      padding: 14px 20px;
      border: 1px solid rgba(148, 201, 255, 0.24);
      border-radius: 999px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      color: #ecf7ff;
      background: linear-gradient(135deg, rgba(27, 70, 168, 0.92), rgba(83, 200, 255, 0.92));
      box-shadow: 0 0 30px rgba(51, 149, 255, 0.24), inset 0 0 16px rgba(255,255,255,0.16);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }
    .btn:disabled { opacity: 0.85; cursor: wait; }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 0 42px rgba(62, 145, 255, 0.45); }
    .btn:active { transform: scale(0.98); }
    
    .frame::after {
      content: ""; position: absolute; inset: -20%; pointer-events: none; z-index: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.02) 45%, transparent 100%);
      transform: translateX(-30%); animation: sweep 7s linear infinite;
    }
    
    @keyframes sweep {
      from { transform: translateX(-60%); }
      to { transform: translateX(60%); }
    }
  </style>
</head>
<body>
  <div class="frame">
    <canvas id="bg"></canvas>
    <canvas id="art"></canvas>
    <button class="btn" id="btn" title="Подключить звук системы">◉ Подключить звук</button>
  </div>
  
  <script>
    const bgCanvas = document.getElementById('bg');
    const bgCtx = bgCanvas.getContext('2d');
    const canvas = document.getElementById('art');
    const ctx = canvas.getContext('2d');
    const btn = document.getElementById('btn');

    let width = 0, height = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);
    let audioEnabled = false, audioCtx, analyser, source;
    
    let lastEnergy = 0, lastBass = 0, rollingMaxEnergy = 0.1;
    let time = 0, flash = 0, cssFilterPulse = 0, glitchPulse = 0;
    
    let smoothFreq = { bass: 0.1, vocal: 0.1, treble: 0.1 };

    let nodes = [], links = [], pulses = [], particles = [], bursts = [], ripples = [];
    let nodeCounter = 0;
    
    // Переменные для эффектов
    let globalHueOffset = 0; 
    let isBreakdown = false; 
    let highEnergyFrames = 0; 
    let blackHole = null; 
    let blackHoleCooldown = 0;
    let floatingTexts = []; 
    
    let mouse = { x: -1000, y: -1000, active: false };

    // --- ИНТЕРАКТИВНОСТЬ: Клик создает ударную волну ---
    canvas.addEventListener('mousedown', (e) => {
      if (!audioEnabled) return;
      const rect = canvas.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const clickY = e.clientY - rect.top;
      
      ripples.push({ x: clickX, y: clickY, r: 0, speed: 12, alpha: 1, maxR: width });
      bursts.push({ x: clickX, y: clickY, r: 10, maxR: 250, alpha: 0.8, hue: getXColor(clickX) });
      
      // Расталкиваем узлы
      nodes.forEach(n => {
        const dx = n.x - clickX;
        const dy = n.y - clickY;
        const dist = Math.hypot(dx, dy);
        if (dist < 300) {
          const force = (300 - dist) / 300 * 80;
          n.ox += (dx / dist) * force;
          n.oy += (dy / dist) * force;
        }
      });
      flash = Math.min(1, flash + 0.3);
    });

    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      mouse.x = e.clientX - rect.left;
      mouse.y = e.clientY - rect.top;
      mouse.active = true;
    });
    canvas.addEventListener('mouseleave', () => mouse.active = false);

    let backgroundOrbs = [
      { x: 0.2, y: 0.3, r: 0.4, speed: 0.001, angle: 0 },
      { x: 0.8, y: 0.7, r: 0.5, speed: 0.0015, angle: 2 },
      { x: 0.5, y: 0.5, r: 0.6, speed: 0.0008, angle: 4 }
    ];

    function getXColor(x) {
      if (isBreakdown) return Math.random() * 15; 
      const ratio = Math.max(0, Math.min(1, x / width));
      return (globalHueOffset + 190 + ratio * 200) % 360; 
    }

    function createNode(kind, fadeIn = false) {
      let xRatio;
      if (kind === 'bass') xRatio = 0.05 + Math.random() * 0.25;
      else if (kind === 'vocal') xRatio = 0.35 + Math.random() * 0.3;
      else xRatio = 0.7 + Math.random() * 0.25;

      const x = width * xRatio;
      const y = height * (0.05 + Math.random() * 0.9);
      
      return {
        id: `node-${nodeCounter++}`, kind,
        x, y, ox: x, oy: y, baseX: x, baseY: y, anchorX: x, anchorY: y,
        radius: 4 + Math.random() * 5, drift: Math.random() * 0.03 + 0.01,
        phase: Math.random() * Math.PI * 2,
        activity: 0.35, dragging: false,
        scale: fadeIn ? 0 : 1, state: fadeIn ? 'in' : 'idle' 
      };
    }

    function resize() {
      width = canvas.clientWidth; height = canvas.clientHeight;
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      
      bgCanvas.width = Math.round(width * dpr); bgCanvas.height = Math.round(height * dpr);
      canvas.width = Math.round(width * dpr); canvas.height = Math.round(height * dpr);
      
      bgCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      
      if (nodes.length === 0) buildScene();
    }

    function buildScene() {
      nodes.length = 0; bursts.length = 0; ripples.length = 0; particles.length = 0; floatingTexts.length = 0;
      for(let i=0; i<8; i++) nodes.push(createNode('bass'));
      for(let i=0; i<10; i++) nodes.push(createNode('vocal'));
      for(let i=0; i<8; i++) nodes.push(createNode('treble'));

      for (let i = 0; i < 50; i++) {
        particles.push({ 
          link: null, t: Math.random(), speed: 0.005 + Math.random() * 0.003, r: 2 + Math.random() * 1.5,
          x: 0, y: 0, vx: 0, vy: 0, alpha: 1, mode: 'link' 
        });
      }
      for (let i = 0; i < 15; i++) pulses.push({ from: nodes[0], to: nodes[0], t: Math.random(), speed: 0.006 + Math.random() * 0.008 });
    }

    function getAverageVolume(array, startBin, endBin) {
      let sum = 0;
      for (let i = startBin; i < endBin; i++) sum += array[i];
      return (sum / (endBin - startBin)) / 255;
    }

    function readAudio() {
      if (!audioEnabled || !analyser) {
        const wave = 0.5 + 0.5 * Math.sin(time * 1.2);
        return { energy: 0.1 + wave * 0.1, bass: 0.2 + 0.1 * Math.sin(time * 0.8), mids: 0.15 + 0.1 * Math.cos(time * 1.5), treble: 0.1 + 0.1 * Math.sin(time * 2) };
      }
      const freq = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(freq);

      return {
        bass: getAverageVolume(freq, 1, 10),
        mids: getAverageVolume(freq, 11, 180),
        treble: getAverageVolume(freq, 180, 750),
        energy: getAverageVolume(freq, 1, 750)
      };
    }

    function updateScene(audio) {
      rollingMaxEnergy = Math.max(rollingMaxEnergy * 0.995, audio.energy, 0.1); 
      
      const energy = audio.energy / rollingMaxEnergy;
      const bass = audio.bass; const vocal = audio.mids; const treble = audio.treble;
      
      globalHueOffset = (globalHueOffset + 0.3 + energy * 0.5) % 360;
      
      if (bass > 0.8 && energy > 0.85) {
        isBreakdown = true;
      } else if (energy < 0.6) {
        isBreakdown = false;
      }

      // --- ЛОГИКА ЧЕРНОЙ ДЫРЫ ---
      if (energy > 0.95) { 
        highEnergyFrames++;
        if (highEnergyFrames > 150 && !blackHole && blackHoleCooldown <= 0) {
          blackHole = { x: width/2, y: height/2, radius: 0 };
          blackHoleCooldown = 400; // Кулдаун после появления
        }
      } else {
        if (blackHole) {
          // Взрыв черной дыры
          bursts.push({ x: blackHole.x, y: blackHole.y, r: 20, maxR: width * 1.2, alpha: 1, hue: getXColor(blackHole.x) });
          ripples.push({ x: blackHole.x, y: blackHole.y, r: 0, speed: 20, alpha: 1, maxR: width * 1.5 });
          blackHole = null;
          flash = 1;
          glitchPulse = 1.0;
        }
        highEnergyFrames = Math.max(0, highEnergyFrames - 2); 
      }
      if (blackHoleCooldown > 0) blackHoleCooldown--;

      if (vocal > 0.55 && Math.random() > 0.7) {
        const vocalNodes = nodes.filter(n => n.kind === 'vocal' && n.scale > 0.5);
        if (vocalNodes.length > 0) {
          const n = vocalNodes[Math.floor(Math.random() * vocalNodes.length)];
          const chars = "0123456789ABCDEF";
          let str = "";
          if(Math.random() > 0.5) {
             for(let i=0;i<6;i++) str += chars[Math.floor(Math.random()*16)];
             str = "0x" + str;
          } else {
             for(let i=0;i<8;i++) str += Math.random()>0.5?"1":"0";
          }
          floatingTexts.push({
            x: n.x + (Math.random()-0.5)*80, 
            y: n.y + (Math.random()-0.5)*80, 
            text: str, 
            alpha: 1, 
            life: 40 + Math.random() * 20
          });
        }
      }

      if (bass > 0.5 && bass > lastBass * 1.2 && energy > 0.5 && !blackHole) {
        const bx = width * (0.1 + Math.random() * 0.8);
        const by = height * (0.1 + Math.random() * 0.8);
        
        bursts.push({ x: bx, y: by, r: 10, maxR: 150 + bass * 350, alpha: 0.8, hue: getXColor(width * Math.random()) });
        ripples.push({ x: bx, y: by, r: 0, speed: 8 + bass * 15, alpha: 0.6, maxR: width * 1.5 });

        flash = Math.min(1, flash + 0.3); // Сделал вспышки чуть мягче
        cssFilterPulse = 1.0; 

        if (energy > 0.8) {
          glitchPulse = 1.0;
          particles.forEach(p => {
            if (p.mode === 'scatter') return;
            const dist = Math.hypot(p.x - bx, p.y - by);
            if (dist < 350) { 
              p.mode = 'scatter';
              const angle = Math.atan2(p.y - by, p.x - bx);
              const force = (350 - dist) / 350 * (15 + bass * 25);
              p.vx = Math.cos(angle) * force;
              p.vy = Math.sin(angle) * force;
              p.alpha = 1;
            }
          });
        }
      }
      
      flash = Math.max(0, flash - 0.05); 
      cssFilterPulse = Math.max(0, cssFilterPulse - 0.04);
      glitchPulse = Math.max(0, glitchPulse - 0.08); 
      
      if (cssFilterPulse > 0.01) {
        const hueShift = Math.floor(cssFilterPulse * 30);
        const contrast = 1 + cssFilterPulse * 0.25;
        const blur = cssFilterPulse > 0.8 ? ` blur(${Math.floor(cssFilterPulse * 2)}px)` : '';
        canvas.style.filter = `hue-rotate(${hueShift}deg) contrast(${contrast})${blur}`;
      } else {
        canvas.style.filter = 'none';
      }

      lastBass = bass; lastEnergy = energy;

      smoothFreq.bass += (bass - smoothFreq.bass) * 0.05;
      smoothFreq.vocal += (vocal - smoothFreq.vocal) * 0.05;
      smoothFreq.treble += (treble - smoothFreq.treble) * 0.05;

      const targets = {
        bass: 6 + Math.floor(smoothFreq.bass * 25),
        vocal: 8 + Math.floor(smoothFreq.vocal * 20),
        treble: 6 + Math.floor(smoothFreq.treble * 25)
      };

      const counts = { bass: 0, vocal: 0, treble: 0 };
      nodes.forEach(n => { if (n.state !== 'out') counts[n.kind]++; });

      for (const kind of ['bass', 'vocal', 'treble']) {
        if (counts[kind] < targets[kind] && nodes.length < 60) {
          nodes.push(createNode(kind, true));
          break;
        } else if (counts[kind] > targets[kind] && counts[kind] > 6) {
          const victim = nodes.find(n => n.kind === kind && n.state === 'idle');
          if (victim) victim.state = 'out';
          break;
        }
      }

      nodes.forEach(node => {
        if (node.state === 'in') {
          node.scale += 0.03; if (node.scale >= 1) { node.scale = 1; node.state = 'idle'; }
        } else if (node.state === 'out') {
          node.scale -= 0.03; if (node.scale <= 0) node.dead = true;
        }
        
        const flow = 0.04 + energy * 0.08;
        let targetAnchorX = node.baseX; let targetAnchorY = node.baseY;

        if (energy > 0.6) targetAnchorX += (width / 2 - node.baseX) * (energy - 0.6) * 0.15;
        
        node.anchorX += (targetAnchorX - node.anchorX) * flow; node.anchorY += (targetAnchorY - node.anchorY) * flow;
        node.ox += (node.anchorX - node.ox) * 0.1; node.oy += (node.anchorY - node.oy) * 0.1;

        if (blackHole) {
           const dx = blackHole.x - node.ox;
           const dy = blackHole.y - node.oy;
           const dist = Math.hypot(dx, dy);
           if (dist > 10) {
               node.ox += (dx / dist) * (15 * energy); 
               node.oy += (dy / dist) * (15 * energy);
           }
        }

        if (mouse.active && !blackHole) {
          const dx = node.ox - mouse.x;
          const dy = node.oy - mouse.y;
          const dist = Math.hypot(dx, dy);
          const repelRadius = 180 + energy * 100;
          if (dist < repelRadius && dist > 0) {
            const force = (repelRadius - dist) / repelRadius;
            node.ox += (dx / dist) * force * 15;
            node.oy += (dy / dist) * force * 15;
          }
        }

        const activeScale = node.kind === 'bass' ? bass*1.5 : node.kind === 'vocal' ? vocal*1.2 : treble*1.4;
        const jitter = treble > 0.3 ? (Math.random() - 0.5) * treble * 10 : 0;
        const sway = Math.sin(time * (0.8 + node.drift * 5) + node.phase) * (4 + bass * 18);
        
        node.x = node.ox + sway + jitter;
        node.y = node.oy + Math.cos(time * 0.9 + node.phase) * (3 + vocal * 10) + jitter;
        node.radius = 3.5 + activeScale * 6;
        node.activity = Math.min(1, 0.2 + activeScale);
      });

      nodes = nodes.filter(n => !n.dead);
      const activeNodes = nodes.filter(n => n.activity > 0.2 && n.scale > 0.1);
      
      links.length = 0;
      activeNodes.forEach(node => {
        let maxLinks = 2 + (energy > 0.7 ? 1 : 0) + (treble > 0.5 && node.kind === 'treble' ? 2 : 0);
        const candidates = activeNodes.filter(other => other !== node);
        
        candidates.map(other => {
          const dist = Math.hypot(node.x - other.x, node.y - other.y);
          const reach = 250 + energy * 400;
          const proximity = Math.max(0, 1 - dist / reach);
          let score = proximity;
          
          if (treble > 0.4 && other.kind === 'treble') score += treble;
          if (bass > 0.4 && other.kind === 'bass') score += bass;
          
          return { other, score };
        }).sort((a, b) => b.score - a.score).slice(0, maxLinks).forEach(({ other, score }) => {
          if (score > 0.05) links.push({ a: node, b: other, strength: score });
        });
      });

      for (let i = bursts.length - 1; i >= 0; i--) {
        const b = bursts[i]; b.r += (b.maxR - b.r) * (0.05 + energy * 0.05); b.alpha -= 0.015;
        if (b.alpha <= 0) bursts.splice(i, 1);
      }
      for (let i = ripples.length - 1; i >= 0; i--) {
        const r = ripples[i]; r.r += r.speed; r.alpha -= 0.008;
        if (r.alpha <= 0 || r.r > r.maxR) ripples.splice(i, 1);
      }

      floatingTexts.forEach(ft => { 
        ft.y -= 0.5; ft.alpha -= 0.02; ft.life--; 
      });
      floatingTexts = floatingTexts.filter(ft => ft.life > 0 && ft.alpha > 0);

      particles.forEach(p => {
        if (blackHole) {
           const dx = blackHole.x - p.x;
           const dy = blackHole.y - p.y;
           const dist = Math.hypot(dx, dy);
           if (dist > 5) {
               p.x += (dx / dist) * (20 * energy);
               p.y += (dy / dist) * (20 * energy);
           }
           p.mode = 'scatter';
           return;
        }

        if (p.mode === 'scatter') {
          p.x += p.vx; p.y += p.vy;
          p.vx *= 0.92; p.vy *= 0.92;
          p.alpha -= (0.015 + Math.random() * 0.02); 
          
          if (p.alpha <= 0) {
            p.mode = 'link';
            if (links.length) p.link = links[Math.floor(Math.random() * links.length)];
            p.t = Math.random(); p.alpha = 1;
          }
        } else {
          if (!p.link || !links.includes(p.link)) {
             if (links.length) p.link = links[Math.floor(Math.random() * links.length)];
          }
          if (p.link) {
            p.t += p.speed * (1 + energy * 8);
            if (p.t > 1) { p.t = 0; p.link = links[Math.floor(Math.random() * links.length)]; }
            if (p.link) {
                p.x = p.link.a.x + (p.link.b.x - p.link.a.x) * p.t;
                p.y = p.link.a.y + (p.link.b.y - p.link.a.y) * p.t;
            }
          }
        }
      });

      pulses.forEach(pulse => {
        pulse.t += pulse.speed * (1 + energy * 6);
        if (pulse.t > 1) {
          pulse.t = 0;
          pulse.from = activeNodes[Math.floor(Math.random() * activeNodes.length)] || nodes[0];
          pulse.to = activeNodes[Math.floor(Math.random() * activeNodes.length)] || nodes[1];
        }
      });

      return { energy, bassBoost: bass*1.5, trebleBoost: treble*1.4, glitchPulse };
    }

    function drawScene(motion) {
      // --- ДИНАМИЧЕСКИЙ ФОН: Подстраивается под цвет нейронов ---
      const grad = bgCtx.createLinearGradient(0, 0, width, height);
      if (isBreakdown) {
          grad.addColorStop(0, `hsl(${globalHueOffset}, 80%, 5%)`); 
          grad.addColorStop(0.5, `hsl(${(globalHueOffset+20)%360}, 90%, 2%)`); 
          grad.addColorStop(1, '#000000');
      } else {
          grad.addColorStop(0, `hsl(${globalHueOffset}, 40%, 4%)`); 
          grad.addColorStop(0.45, `hsl(${(globalHueOffset+30)%360}, 30%, 6%)`); 
          grad.addColorStop(1, `hsl(${(globalHueOffset+60)%360}, 20%, 3%)`);
      }
      bgCtx.fillStyle = grad; bgCtx.fillRect(0, 0, width, height);

      bgCtx.save();
      const gridScale = 1 + motion.energy * 0.05; 
      bgCtx.translate(width/2, height/2);
      bgCtx.scale(gridScale, gridScale);
      bgCtx.translate(-width/2, -height/2);
      
      bgCtx.globalAlpha = 0.1 + motion.energy * 0.15;
      // Сетка тоже берет оттенок сцены
      bgCtx.strokeStyle = isBreakdown ? `hsla(${globalHueOffset}, 80%, 50%, 0.15)` : `hsla(${globalHueOffset}, 50%, 60%, 0.08)`;
      const step = 54;
      bgCtx.beginPath();
      for (let i = -step*2; i < width + step*2; i += step) { bgCtx.moveTo(i, -step*2); bgCtx.lineTo(i, height + step*2); }
      for (let j = -step*2; j < height + step*2; j += step) { bgCtx.moveTo(-step*2, j); bgCtx.lineTo(width + step*2, j); }
      bgCtx.stroke();
      bgCtx.restore();

      ctx.save();
      
      // --- CAMERA SHAKE: Тряска камеры на мощных дропах ---
      if (motion.energy > 0.85 || isBreakdown) {
          const shake = (motion.energy - 0.7) * 15;
          ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
      }

      ctx.globalCompositeOperation = 'source-over';
      
      if (motion.glitchPulse > 0.01) {
        const shiftX = (Math.random() - 0.5) * 50 * motion.glitchPulse;
        const shiftY = (Math.random() - 0.5) * 20 * motion.glitchPulse;
        ctx.drawImage(canvas, shiftX, shiftY);
      }

      ctx.fillStyle = isBreakdown ? 'rgba(10, 0, 0, 0.4)' : 'rgba(2, 4, 12, 0.3)'; 
      ctx.fillRect(0, 0, width, height);

      ctx.globalCompositeOperation = 'screen';
      backgroundOrbs.forEach(orb => {
        orb.angle += orb.speed + motion.energy * 0.01;
        const ox = width * orb.x + Math.cos(orb.angle) * (150 + motion.bassBoost * 100);
        const oy = height * orb.y + Math.sin(orb.angle) * (150 + motion.bassBoost * 100);
        const radius = width * orb.r * (0.8 + motion.energy * 0.6);

        const orbGrad = ctx.createRadialGradient(ox, oy, 0, ox, oy, radius);
        const finalHue = isBreakdown ? (Math.random() * 10) : (globalHueOffset + orb.angle * 20) % 360;
        orbGrad.addColorStop(0, `hsla(${finalHue}, 80%, 50%, ${0.03 + motion.energy * 0.08})`);
        orbGrad.addColorStop(1, `hsla(${finalHue}, 80%, 50%, 0)`);
        
        ctx.fillStyle = orbGrad;
        ctx.beginPath(); ctx.arc(ox, oy, radius, 0, Math.PI * 2); ctx.fill();
      });
      ctx.globalCompositeOperation = 'source-over';

      ripples.forEach(rip => {
        ctx.beginPath();
        ctx.arc(rip.x, rip.y, rip.r, 0, Math.PI * 2);
        ctx.lineWidth = 1 + rip.alpha * 4;
        const hue = isBreakdown ? 0 : globalHueOffset;
        ctx.strokeStyle = `hsla(${hue}, 100%, 70%, ${rip.alpha * 0.5})`;
        ctx.stroke();
      });

      bursts.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        const burstGrad = ctx.createRadialGradient(b.x, b.y, b.r * 0.5, b.x, b.y, b.r);
        burstGrad.addColorStop(0, `hsla(${b.hue}, 100%, 70%, 0)`);
        burstGrad.addColorStop(0.8, `hsla(${b.hue}, 100%, 70%, ${b.alpha * 0.2})`);
        burstGrad.addColorStop(1, `hsla(${b.hue}, 100%, 80%, ${b.alpha})`);
        ctx.fillStyle = burstGrad;
        ctx.fill();
        ctx.strokeStyle = `hsla(${b.hue}, 100%, 90%, ${b.alpha})`;
        ctx.lineWidth = 1 + b.alpha * 3;
        ctx.stroke();
      });

      if (flash > 0.01) {
        ctx.fillStyle = isBreakdown ? `rgba(255, 50, 50, ${flash * 0.1})` : `rgba(255, 255, 255, ${flash * 0.06})`;
        ctx.fillRect(0, 0, width, height);
      }

      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      
      links.forEach(link => {
        const scaleCombo = Math.min(link.a.scale, link.b.scale);
        if (scaleCombo < 0.05) return;
        
        const dist = Math.hypot(link.b.x - link.a.x, link.b.y - link.a.y) || 1;
        const avgX = (link.a.x + link.b.x) / 2;
        const hue = getXColor(avgX);
        
        let alpha = Math.max(0.05, 0.1 + (1 - dist / 800) * 0.4 + motion.energy * 0.2) * scaleCombo;
        
        ctx.beginPath(); ctx.moveTo(link.a.x, link.a.y);
        ctx.quadraticCurveTo((link.a.x + link.b.x)/2, (link.a.y + link.b.y)/2, link.b.x, link.b.y);
        
        ctx.strokeStyle = `hsla(${hue}, 90%, 65%, ${alpha})`;
        ctx.lineWidth = (0.5 + motion.energy * 1.5) * scaleCombo;
        ctx.stroke();
      });

      pulses.forEach(p => {
        if(!p.from || !p.to) return;
        const x = p.from.x + (p.to.x - p.from.x) * p.t;
        const y = p.from.y + (p.to.y - p.from.y) * p.t;
        const hue = getXColor(x);
        ctx.beginPath(); ctx.arc(x, y, 4 + motion.energy * 5, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${hue}, 100%, 80%, ${0.5 + Math.sin(p.t * Math.PI) * 0.5})`;
        ctx.fill();
      });

      nodes.forEach(node => {
        if (node.scale < 0.01) return;
        const hue = getXColor(node.x);
        const radius = node.radius * node.scale;
        
        ctx.beginPath(); ctx.arc(node.x, node.y, radius * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${hue}, 90%, 60%)`;
        ctx.globalAlpha = (0.1 + node.activity * 0.2) * node.scale;
        ctx.fill();
        
        ctx.beginPath(); ctx.arc(node.x, node.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.globalAlpha = (0.5 + node.activity * 0.5) * node.scale;
        ctx.fill();
        
        ctx.beginPath(); ctx.arc(node.x, node.y, radius * 0.4, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${hue}, 100%, 75%)`;
        ctx.globalAlpha = node.scale;
        ctx.fill();
      });

      ctx.globalAlpha = 1;
      particles.forEach(p => {
        let scale = 1;
        const hue = getXColor(p.x);

        if (p.mode === 'link' && p.link) {
          scale = Math.min(p.link.a.scale, p.link.b.scale);
          if (scale < 0.1) return;
          ctx.fillStyle = `hsla(${hue}, 100%, 70%, ${scale})`;
        } else if (p.mode === 'scatter') {
          scale = 1 + (1 - p.alpha) * 0.8;
          ctx.fillStyle = `hsla(${hue}, 100%, 85%, ${p.alpha})`;
        } else {
          return;
        }

        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * scale, 0, Math.PI * 2);
        ctx.shadowBlur = 12 * scale; ctx.shadowColor = ctx.fillStyle;
        ctx.fill(); ctx.shadowBlur = 0;
      });

      if (floatingTexts.length > 0) {
        ctx.font = "bold 11px monospace";
        ctx.textAlign = "center";
        floatingTexts.forEach(ft => {
          ctx.fillStyle = isBreakdown ? `rgba(255, 100, 100, ${ft.alpha})` : `rgba(150, 220, 255, ${ft.alpha})`;
          ctx.shadowBlur = 8;
          ctx.shadowColor = ctx.fillStyle;
          ctx.fillText(ft.text, ft.x, ft.y);
        });
        ctx.shadowBlur = 0;
      }

      if (blackHole) {
        blackHole.radius = Math.min(60, blackHole.radius + 1.5);
        
        ctx.beginPath();
        ctx.arc(blackHole.x, blackHole.y, blackHole.radius + Math.random() * 4, 0, Math.PI * 2);
        ctx.fillStyle = '#000000';
        ctx.shadowBlur = 40 + Math.random() * 20;
        ctx.shadowColor = `hsl(${getXColor(blackHole.x)}, 100%, 60%)`;
        ctx.fill();
        ctx.shadowBlur = 0;
        
        ctx.beginPath();
        ctx.arc(blackHole.x, blackHole.y, blackHole.radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255, 255, 255, ${0.5 + Math.random() * 0.5})`;
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      ctx.restore(); // Сбрасываем эффекты камеры
    }

    function animate() {
      time += 0.016;
      drawScene(updateScene(readAudio()));
      requestAnimationFrame(animate);
    }

    async function startAudio() {
      if (audioEnabled) return;
      btn.disabled = true; btn.textContent = 'Подключение...';
      try {
        const stream = await navigator.mediaDevices.getDisplayMedia({
          video: true, audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
        });
        if (!stream.getAudioTracks().length) throw new Error('Нет звука');
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048; analyser.smoothingTimeConstant = 0.72; 
        source.connect(analyser); audioEnabled = true; btn.style.display = 'none';
      } catch (err) { btn.disabled = false; btn.textContent = 'Ошибка'; }
    }

    btn.addEventListener('click', startAudio);
    window.addEventListener('resize', resize);
    resize(); animate();
  </script>
</body>
</html>
