    function trimEffectQueue(queue, limit) {
      if (queue.length > limit) queue.splice(0, queue.length - limit);
    }

    function spawnRipple(x, y, kind, energy, bass, vocal, treble) {
      const calmProfile = getCalmProfile();
      const isMouse = kind === 'mouse';
      const speed = (CONFIG.rippleSpeed + energy * CONFIG.rippleEnergyBoost + bass * 4 + treble * 2) * calmProfile.rippleSpeedMult * (isMouse ? 1.02 : 1.0);
      const alpha = CONFIG.rippleAlpha * (isMouse ? CONFIG.rippleMouseAlpha : 1.0) * (0.92 + energy * 0.28) * calmProfile.rippleAlphaMult;
      const maxR = width * CONFIG.rippleMaxR * (isMouse ? CONFIG.rippleMouseScale : 1.0) * calmProfile.rippleScaleMult;
      ripples.push({
        x,
        y,
        r: 0,
        speed,
        alpha,
        maxR,
        kind,
        decay: CONFIG.rippleDecay * (isMouse ? 0.88 : 1.0) * calmProfile.rippleDecayMult
      });
      trimEffectQueue(ripples, 18);
    }

    function makeCurrentChain(source, energy, bass, vocal, treble, xHint = null, yHint = null) {
      const activeNodes = nodes.filter(n => n.scale > 0.26 && n.activity > 0.16);
      if (activeNodes.length < 2) return null;
      const buckets = [[], [], [], [], []];
      activeNodes.forEach(n => {
        const bi = clampRange(Math.floor((n.x / Math.max(width, 1)) * 5), 0, 4);
        buckets[bi].push(n);
      });
      const chosen = [];
      buckets.forEach(bucket => {
        if (!bucket.length) return;
        let pick = bucket[(Math.random() * bucket.length) | 0];
        if (xHint != null) {
          let best = pick;
          let bestDist = Math.abs(pick.x - xHint) + Math.abs((pick.y || 0) - (yHint ?? pick.y ?? 0)) * 0.35;
          for (const candidate of bucket) {
            const d = Math.abs(candidate.x - xHint) + Math.abs(candidate.y - (yHint ?? candidate.y)) * 0.35;
            if (d < bestDist) { best = candidate; bestDist = d; }
          }
          pick = best;
        }
        chosen.push(pick);
      });
      if (chosen.length < 3) {
        activeNodes.sort((a, b) => a.x - b.x);
        chosen.length = 0;
        const targetCount = Math.min(activeNodes.length, 4 + Math.floor(energy * 3));
        const step = Math.max(1, Math.floor(activeNodes.length / targetCount));
        for (let i = 0; i < activeNodes.length && chosen.length < targetCount; i += step) {
          chosen.push(activeNodes[i]);
        }
      }
      chosen.sort((a, b) => a.x - b.x);
      if (chosen.length < 2) return null;
      return {
        nodes: chosen,
        source,
        hue: source === 'mouse' ? getXColor(xHint ?? chosen[0].x) : source === 'beat' ? (getXColor(chosen[0].x) + getXColor(chosen[chosen.length - 1].x)) * 0.5 : getXColor(chosen[(chosen.length / 2) | 0].x),
        alpha: 0.72 + energy * 0.28,
        life: 1.0 + energy * 1.4,
        pulse: 0,
        phase: Math.random() * Math.PI * 2,
        speed: 0.45 + energy * 0.85,
        thickness: source === 'mouse' ? 4.8 : source === 'beat' ? 4.1 : 3.2,
        spread: CONFIG.chainSpread,
        seed: Math.random() * 1000
      };
    }

    function makeWavefront(kind, side, energy, bass, vocal, treble, variant = null, calmProfile = null) {
      if (!calmProfile) calmProfile = getCalmProfile();
      const profile = getBandProfile(kind);
      const isBass = kind === 'bass';
      const isTreble = kind === 'treble';
      const isMid = kind === 'vocal';
      const mode = variant ?? (Math.random() > 0.55 ? 'ribbon' : Math.random() > 0.45 ? 'filament' : 'flash');
      const y = isBass
        ? height * (0.12 + bass * 0.26 + Math.random() * 0.16)
        : isTreble
          ? height * (0.56 + treble * 0.22 + Math.random() * 0.16)
          : height * (0.28 + vocal * 0.34 + Math.random() * 0.16);
      const dir = side === 'left' ? 1 : -1;
      const hue = side === 'left' ? getXColor(width * 0.08) : getXColor(width * 0.92);
      const thickness = mode === 'flash' ? 0.72 : mode === 'filament' ? 0.86 : 1.0;
      const speedScale = mode === 'flash' ? 1.28 : mode === 'filament' ? 0.92 : 1.0;

      const visFactor = calmProfile.waveVisibility;
      const speedFactor = calmProfile.waveSpeedMult;

      const widthVariation = 1 + 0.2 * Math.sin(time * 2.5 + energy * 3);
      const strandVariation = Math.floor(energy * 4);

      return {
        kind,
        mode,
        x: side === 'left' ? -CONFIG.wavefrontWidth : width + CONFIG.wavefrontWidth,
        y,
        dir,
        speed: (CONFIG.wavefrontSpeed + energy * 28 + (isBass ? bass * 20 : isTreble ? treble * 20 : vocal * 15)) * speedScale * (0.88 + Math.random() * 0.42) * speedFactor,
        width: (CONFIG.wavefrontWidth + energy * 240 + (isBass || isTreble ? 90 : 50)) * (mode === 'flash' ? 0.72 : mode === 'filament' ? 0.84 : 1) * visFactor * widthVariation,
        alpha: (CONFIG.wavefrontAlpha + energy * 0.22 + (mode === 'flash' ? 0.08 : 0)) * visFactor,
        glow: (CONFIG.wavefrontGlow + energy * 0.25 + (mode === 'filament' ? 0.12 : 0)) * visFactor,
        hue,
        phase: Math.random() * Math.PI * 2,
        life: 1.0 + energy * 1.5,
        amp: (10 + energy * 22 + (isBass ? bass * 42 : isTreble ? treble * 42 : vocal * 28)) * (0.78 + profile.spread * 0.34),
        thickness,
        spark: mode === 'flash' ? 0.45 : 0.22 + Math.random() * 0.35,
        wobble: 0.5 + Math.random() * 1.2,
        trail: 0.4 + Math.random() * 0.5,
        extraStrands: strandVariation
      };
    }

    function createNode(kind, fadeIn = false) {
      const xRatio = kind === 'bass' ? 0.06 + Math.random() * 0.24 : kind === 'vocal' ? 0.34 + Math.random() * 0.32 : 0.68 + Math.random() * 0.24;
      const x = width * xRatio;
      const y = height * (0.08 + Math.random() * 0.84);
      return {
        id: `node-${nodeCounter++}`, kind,
        x, y, ox: x, oy: y, baseX: x, baseY: y, anchorX: x, anchorY: y,
        vx: 0, vy: 0, radius: 4 + Math.random() * 4.5,
        drift: Math.random() * 0.018 + 0.006, phase: Math.random() * Math.PI * 2,
        activity: 0.28, rot: Math.random() * Math.PI * 2,
        scale: fadeIn ? 0 : 1, state: fadeIn ? 'in' : 'idle', dead: false,
        memory: 0.08 + Math.random() * 0.12, seed: Math.random()
      };
    }

    function resize() {
      width = canvas.clientWidth;
      height = canvas.clientHeight;
      dpr = Math.min(window.devicePixelRatio || 1, 1.25);

      bgCanvas.width = Math.round(width * dpr);
      bgCanvas.height = Math.round(height * dpr);
      canvas.width = Math.round(width * dpr);
      canvas.height = Math.round(height * dpr);

      bgCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      if (nodes.length === 0) buildScene();
    }

    function buildScene() {
      nodes.length = 0; links.length = 0; linkMemory.clear();
      pulses.length = 0; particles.length = 0; bursts.length = 0;
      ripples.length = 0; beatBridges.length = 0; floatingTexts.length = 0; wavefronts.length = 0; currentChains.length = 0;

      for (let i = 0; i < CONFIG.bassNodes; i++) nodes.push(createNode('bass'));
      for (let i = 0; i < CONFIG.vocalNodes; i++) nodes.push(createNode('vocal'));
      for (let i = 0; i < CONFIG.trebleNodes; i++) nodes.push(createNode('treble'));

      for (let i = 0; i < CONFIG.smallParticleCount; i++) {
        particles.push({ from: null, to: null, t: Math.random(), speedBase: 0.55 + Math.random() * 0.75, r: 1.25 + Math.random() * 1.5, x: 0, y: 0, scale: 1, hue: 0, linkAlpha: 0 });
      }

      for (let i = 0; i < 16; i++) {
        pulses.push({ from: null, to: null, t: Math.random(), speedBase: 0.8 + Math.random() * 0.4, scale: 1, hue: 0, linkAlpha: 0 });
      }
    }

    function readAudio() {
      if (!audioEnabled || !analyser || !freqData) {
        const wave = 0.5 + 0.5 * Math.sin(time * 1.18);
        const bass = 0.18 + 0.06 * Math.sin(time * 0.7);
        const vocal = 0.16 + 0.06 * Math.cos(time * 1.12);
        const treble = 0.15 + 0.07 * Math.sin(time * 1.73 + 1.4);
        updateHudBands(bass, vocal, treble);
        return {
          bass,
          vocal,
          treble,
          energy: 0.12 + wave * 0.08,
          beatPulse: 0,
          snarePulse: 0
        };
      }
      analyser.getByteFrequencyData(freqData);

      const bassRaw = getBandVolumeHz(freqData, ...BAND_BINS.bass, BAND_TILT.bass);
      const vocalRaw = getBandVolumeHz(freqData, ...BAND_BINS.vocal, BAND_TILT.vocal);
      const trebleRaw = getBandVolumeHz(freqData, ...BAND_BINS.treble, BAND_TILT.treble);
      const airRaw = getBandVolumeHz(freqData, ...BAND_BINS.air, BAND_TILT.air);

      const bass = shapeBand('bass', bassRaw);
      const vocal = shapeBand('vocal', vocalRaw);
      const treble = shapeBand('treble', trebleRaw);
      const air = shapeBand('air', airRaw);

      const energy = clamp01(bass * 0.26 + vocal * 0.34 + treble * 0.30 + air * 0.10);
      updateHudBands(bass, vocal, treble);

      return {
        bass,
        vocal,
        treble,
        energy,
        beatPulse: Math.max(0, kickTimer / 10),
        snarePulse: Math.max(0, snareTimer / 7)
      };
    }

    function makeBeatBridge(a, b, energy, bass, treble) {
      const dx = b.x - a.x, dy = b.y - a.y, dist = Math.hypot(dx, dy) || 1;
      const nx = -dy / dist, ny = dx / dist, bend = Math.sin(time * 1.2 + dist * 0.015) * dist * CONFIG.linkBendFactor;
      return {
        a, b, hueA: getXColor(a.x), hueB: getXColor(b.x),
        cx: (a.x + b.x) * 0.5 + nx * bend, cy: (a.y + b.y) * 0.5 + ny * bend,
        alpha: 0.22 + energy * 0.45 + bass * 0.18 + treble * 0.12, life: 1.0 + energy * 0.7
      };
    }

    function updateScene(audio) {
      const { bass, vocal, treble, energy } = audio;
      const calmProfile = getCalmProfile();
      const calmness = calmProfile.calm;
      const bassRise = Math.max(0, bass - lastBass), trebleRise = Math.max(0, treble - lastTreble);

      globalSpeedMult = mix(globalSpeedMult, (CONFIG.speedBase + energy * CONFIG.speedEnergyMult) * calmProfile.speedMult, 0.12);
      globalHueOffset = (globalHueOffset + 0.16 * globalSpeedMult + energy * 0.5 * calmProfile.wave) % 360;
      longTermEnergy = longTermEnergy * 0.992 + energy * 0.008;

      breakdownIntensity += (breakdownTarget - breakdownIntensity) * 0.08;
      breakdownIntensity = clamp01(breakdownIntensity);
      if (hudDrop) {
        hudDrop.textContent = breakdownIntensity > 0.985 ? 'MAX' : breakdownIntensity > 0.55 ? 'DROP' : 'LIVE';
      }

      if (breakdownIntensity > 0.03) cssFilterPulse = Math.max(cssFilterPulse, breakdownIntensity * 0.6);

      if (kickTimer > 0) kickTimer--;
      if (snareTimer > 0) snareTimer--;

      const beatHit = bassRise > CONFIG.beatKickRise && bass > CONFIG.beatKickThreshold && kickTimer === 0;
      if (beatHit) {
        kickTimer = 10;
        const activeNodes = nodes.filter(n => n.scale > 0.4 && n.activity > 0.18);
        if (activeNodes.length > 0) {
          let n = activeNodes[(Math.random() * activeNodes.length) | 0];
          const bassNodes = activeNodes.filter(nd => nd.kind === 'bass');
          if (bassNodes.length && Math.random() > 0.22) n = bassNodes[(Math.random() * bassNodes.length) | 0];

          if (Math.random() < calmProfile.rippleChance * mix(1.0, 0.72, calmProfile.calmBoost)) {
            spawnRipple(n.x, n.y, 'beat', energy + bass * mix(0.65, 0.42, calmProfile.calmBoost), bass, vocal, treble);
          }
          const beatHalo = makeCurrentChain('beat', energy + bass * 0.35, bass, vocal, treble);
          if (beatHalo) { currentChains.push(beatHalo); trimEffectQueue(currentChains, 10); }

          const leftCluster = activeNodes.filter(nd => nd.kind === 'bass');
          const centerCluster = activeNodes.filter(nd => nd.kind === 'vocal');
          const rightCluster = activeNodes.filter(nd => nd.kind === 'treble');

          if (leftCluster.length && rightCluster.length) {
            beatBridges.push(makeBeatBridge(leftCluster[(Math.random() * leftCluster.length) | 0], rightCluster[(Math.random() * rightCluster.length) | 0], energy, bass, treble));
          }
          if (leftCluster.length && centerCluster.length) {
            beatBridges.push(makeBeatBridge(leftCluster[(Math.random() * leftCluster.length) | 0], centerCluster[(Math.random() * centerCluster.length) | 0], energy, bass, treble));
          }

          const wsc = calmProfile.waveSpawnChance;
          if (Math.random() < wsc) wavefronts.push(makeWavefront('bass', 'left', energy, bass, vocal, treble, Math.random() > mix(0.55, 0.82, calmProfile.calmBoost) ? 'ribbon' : 'flash', calmProfile));
          if (Math.random() < wsc && (vocal > 0.12 || energy > 0.2)) wavefronts.push(makeWavefront('vocal', Math.random() > 0.5 ? 'left' : 'right', energy, bass, vocal, treble, Math.random() > mix(0.45, 0.75, calmProfile.calmBoost) ? 'filament' : 'ribbon', calmProfile));
          if (Math.random() < wsc && (treble > 0.12 || energy > 0.18)) wavefronts.push(makeWavefront('treble', 'right', energy, bass, vocal, treble, Math.random() > mix(0.5, 0.82, calmProfile.calmBoost) ? 'flash' : 'filament', calmProfile));
          if (Math.random() < wsc && energy > 0.42 && Math.random() < mix(0.72, 0.36, calmProfile.calmBoost)) wavefronts.push(makeWavefront('vocal', 'left', energy * 0.85, bass, vocal, treble, 'ribbon', calmProfile));
          trimEffectQueue(wavefronts, 14);

          if (breakdownIntensity > 0.2) {
            flash = Math.min(1, flash + 0.28); cssFilterPulse = Math.max(cssFilterPulse, 0.55);
          }
        }
      }

      if (trebleRise > 0.1 && treble > CONFIG.trebleSnareThreshold && snareTimer === 0) {
        snareTimer = 7;
        const trebleNodes = nodes.filter(n => n.kind === 'treble' && n.scale > 0.45);
        if (trebleNodes.length > 0) {
          const n = trebleNodes[(Math.random() * trebleNodes.length) | 0];
          if (Math.random() < calmProfile.rippleChance) {
            spawnRipple(n.x, n.y, 'auto', energy + treble * 0.35, bass, vocal, treble);
          }
          if (Math.random() < calmProfile.waveSpawnChance) wavefronts.push(makeWavefront('treble', 'right', energy + treble * 0.18, bass, vocal, treble, Math.random() > 0.45 ? 'filament' : 'flash', calmProfile));
          trimEffectQueue(wavefronts, 14);
          const trebleChain = makeCurrentChain('auto', energy + treble * 0.24, bass, vocal, treble, n.x, n.y);
          if (trebleChain) { currentChains.push(trebleChain); trimEffectQueue(currentChains, 10); }
        }
      }

      if (energy > longTermEnergy * 1.18 && energy > 0.3 && Math.random() > 0.72) {
        const pool = nodes.filter(n => n.scale > 0.35 && n.activity > 0.3);
        if (pool.length > 0) {
          const n = pool[(Math.random() * pool.length) | 0];
          const textPool = ['SYNC', 'FLOW', 'GRID', 'NODE', '0x' + Math.random().toString(16).slice(2, 6).toUpperCase(), 'DATA', 'LINK'];
          floatingTexts.push({
            x: n.x + (Math.random() - 0.5) * 100,
            y: n.y + (Math.random() - 0.5) * 70,
            text: textPool[(Math.random() * textPool.length) | 0],
            alpha: 1,
            life: (12 + Math.random() * 8) * calmProfile.floatingTextSpawnLife
          });
          if (Math.random() < calmProfile.rippleExtraChance * mix(1.0, 0.66, calmProfile.calmBoost)) {
            spawnRipple(n.x, n.y, 'auto', energy * 0.9, bass, vocal, treble);
          }
          if (Math.random() > mix(0.70, 0.93, calmProfile.calmBoost)) {
            const surge = makeCurrentChain('auto', energy, bass, vocal, treble, n.x, n.y);
            if (surge) currentChains.push(surge);
          }
        }
      }

      flash = Math.max(0, flash - 0.04 * globalSpeedMult);
      cssFilterPulse = Math.max(0, cssFilterPulse - 0.03 * globalSpeedMult);
      lastBass = bass; lastTreble = treble;

      const spawnTargets = {
        bass: Math.max(4, Math.round((7 + Math.floor(6 + bass * 28 + energy * 5)) * calmProfile.spawn)),
        vocal: Math.max(4, Math.round((8 + Math.floor(5 + vocal * 22 + energy * 4)) * calmProfile.spawn)),
        treble: Math.max(4, Math.round((7 + Math.floor(6 + treble * 28 + energy * 5)) * calmProfile.spawn))
      };

      const aliveNodes = nodes.filter(n => !n.dead);
      const counts = { bass: 0, vocal: 0, treble: 0 };
      aliveNodes.forEach(n => counts[n.kind]++);

      for (const kind of ['bass', 'vocal', 'treble']) {
        if (counts[kind] < spawnTargets[kind] && nodes.length < CONFIG.maxNodes) {
          nodes.push(createNode(kind, true)); break;
        } else if (counts[kind] > spawnTargets[kind] && counts[kind] > 5) {
          const victim = nodes.find(n => n.kind === kind && n.state === 'idle');
          if (victim) victim.state = 'out'; break;
        }
      }

      const silence = clamp01(1 - Math.max(energy, breakdownIntensity * 0.95) * 3.6);
      const quietPulse = mix(1.32, 0.22, calmProfile.calmBoost);
      const idlePhaseA = time * (0.18 + silence * 0.12) * quietPulse;
      const idlePhaseB = time * (0.27 + silence * 0.09) * quietPulse;

      nodes.forEach(node => {
        if (node.state === 'in') {
          node.scale += 0.045 * globalSpeedMult;
          if (node.scale >= 1) { node.scale = 1; node.state = 'idle'; }
        } else if (node.state === 'out') {
          node.scale -= 0.04 * globalSpeedMult;
          if (node.scale <= 0) node.dead = true;
        }

        const profile = getBandProfile(node.kind);
        const bandWeight = getNodeSignal(node.kind, bass, vocal, treble);
        const laneBias = width * 0.20 * profile.pan * (0.35 + bandWeight * 0.85) * 0.78;
        const centerPull = (width * 0.5 - node.baseX) * 0.015 * (energy - 0.45);
        const audioScatter = Math.sin(time * 0.8 + node.seed * 10) * (width * 0.12 + width * 0.08 * profile.spread) * energy;
        const xDrift = Math.cos(time * 0.31 + node.phase + node.seed * 2) * width * 0.018 * profile.spread * (0.45 + energy);

        const anchorShift = laneBias + centerPull + audioScatter + xDrift;
        const targetAnchorX = node.baseX + anchorShift;
        const targetAnchorY = node.baseY + Math.sin(time * (0.45 + bandWeight * 0.22) + node.phase) * (3 + bandWeight * 8);

        const flow = (0.018 * globalSpeedMult + energy * 0.02 + bandWeight * 0.006) * mix(1.0, 0.46, calmProfile.calmBoost);
        node.anchorX += (targetAnchorX - node.anchorX) * flow;
        node.anchorY += (targetAnchorY - node.anchorY) * flow;

        const calmNudge = (0.08 + energy * 0.18 + bandWeight * 0.12) * calmProfile.idleBreath * mix(1.0, 0.7, calmProfile.calmBoost);
        node.vx += (Math.sin(time * 0.36 + node.phase) * 0.15) * calmNudge * 0.35;
        node.vy += (Math.cos(time * 0.41 + node.phase) * 0.12) * calmNudge * 0.35;

        const idleDrift = (0.006 + silence * 0.018) * CONFIG.idleNodeWander * calmProfile.idleWander * mix(1.0, 0.55, calmProfile.calmBoost);
        node.vx += Math.sin(idlePhaseA + node.phase + node.seed * 7) * idleDrift;
        node.vy += Math.cos(idlePhaseB + node.phase + node.seed * 5) * idleDrift * 0.75;

        if (breakdownIntensity > 0.14) {
          const chaos = breakdownIntensity * 12.0 * calmProfile.noise;
          node.vx += (Math.random() - 0.5) * chaos;
          node.vy += (Math.random() - 0.5) * chaos;
        }

        node.ox += node.vx;
        node.oy += node.vy;
        node.vx *= 0.88;
        node.vy *= 0.88;

        node.ox += (node.anchorX - node.ox) * 0.06;
        node.oy += (node.anchorY - node.oy) * 0.06;

        if (mouse.active) {
          const dx = node.ox - mouse.x, dy = node.oy - mouse.y, dist = Math.hypot(dx, dy);
          const repelRadius = 180 + energy * 110;
          if (dist < repelRadius && dist > 0) {
            const force = (repelRadius - dist) / repelRadius;
            node.vx += (dx / dist) * force * 2.3;
            node.vy += (dy / dist) * force * 2.3;
          }
        }

        const softOrb = (Math.sin(time * (0.42 * globalSpeedMult + node.drift * 2.4) + node.phase) * (18 + energy * 24 + breakdownIntensity * 16) + Math.cos(time * 0.19 + node.seed * 11) * 6 * profile.spread) * calmProfile.swirl;
        const softLift = Math.cos(time * (0.67 + bandWeight * 0.05) + node.phase) * (14 + energy * 18) * calmProfile.swirl;

        node.x = node.ox + softOrb;
        node.y = node.oy + softLift;
        node.radius = mix(node.radius, CONFIG.nodeBaseRadius + bandWeight * 5.2 + energy * CONFIG.nodeEnergyRadiusBoost + breakdownIntensity * 1.2, 0.1);

        let waveBoost = 0;
        for (const wf of wavefronts) {
          const dx = Math.abs(node.x - wf.x);
          if (dx < wf.width) {
            const pulse = 1 - dx / wf.width;
            const lane = Math.abs(node.y - wf.y);
            const lanePulse = lane < 220 ? 1 - lane / 220 : 0;
            waveBoost += pulse * lanePulse * (0.14 + wf.alpha * 0.42);
            if (node.kind === wf.kind) waveBoost += pulse * 0.06;
          }
        }

        node.activity = clamp01(0.08 + bandWeight * 0.46 + energy * 0.18 + silence * 0.14 + breakdownIntensity * 0.2 + waveBoost - calmProfile.activityBias);
        node.rot += (0.012 + treble * 0.08 + energy * 0.03) * globalSpeedMult;
      });

      nodes = nodes.filter(n => !n.dead);

      const aliveIds = new Set(nodes.map(n => n.id));
      for (const [key, rec] of linkMemory) {
        if (!aliveIds.has(rec.a.id) || !aliveIds.has(rec.b.id)) {
          linkMemory.delete(key);
        }
      }

      frameCount++;
      if (frameCount % 60 === 0) {
        for (const [key, rec] of linkMemory) {
          if (rec.strength < 0.005 && rec.usage < 0.003) {
            linkMemory.delete(key);
          }
        }
      }

      const activeNodes = nodes.filter(n => n.activity > 0.18 && n.scale > 0.1);
      const seenPairs = new Set();
      const maxLinkDistance = Math.hypot(width, height) * 1.2;

      activeNodes.forEach((node, i) => {
        for (let j = i + 1; j < activeNodes.length; j++) {
          const other = activeNodes[j];
          const dx = other.x - node.x, dy = other.y - node.y, dist = Math.hypot(dx, dy) || 1;
          const proximity = Math.max(0, 1 - dist / maxLinkDistance);
          if (proximity <= 0) continue;

          const sameKind = node.kind === other.kind;
          const wheelDrive = breakdownIntensity;
          const nodeSignal = getNodeSignal(node.kind, bass, vocal, treble);
          const otherSignal = getNodeSignal(other.kind, bass, vocal, treble);
          const bandMean = (nodeSignal + otherSignal) * 0.5;
          const bandContrast = Math.abs(nodeSignal - otherSignal);
          const geoSpan = Math.abs(node.x - other.x) / Math.max(width, 1);
          const crossScreen = smoothstep(0.18, 0.82, geoSpan);

          const nearPriority = clampRange(CONFIG.linkNearPriority, 0.2, 3.5);
          const locality = clamp01((nearPriority - 0.2) / 3.3);
          const bridgeBias = 1 - locality;

          const nearCurve = mix(0.72, 4.2, locality);
          const localAffinity = Math.pow(proximity, nearCurve);
          const longAffinity = Math.pow(1 - proximity, mix(0.58, 1.08, bridgeBias));
          const distanceBias = mix(longAffinity, localAffinity, locality);

          const bridgeRelax = 0.74 + bridgeBias * 0.88 + Math.max(0, 0.22 - locality * 0.1);
          const farBridgeAffinity = smoothstep(0.52, 0.98, crossScreen) * 0.14 * bridgeRelax;

          const baseDrive = energy * 0.92 + bandMean * 0.34 + wheelDrive * 0.88;
          const connectionDrive = Math.max(baseDrive * (0.18 + distanceBias * 0.82) + farBridgeAffinity, 0.001);
          if (connectionDrive <= 0.001) continue;

          let score = connectionDrive * CONFIG.linkScoreEnergyWeight;
          score += connectionDrive * distanceBias * (0.66 + (1 - locality) * 0.12);
          score += connectionDrive * (sameKind ? CONFIG.linkSameClusterBonus : CONFIG.linkDiffClusterBonus + bandContrast * 0.06);
          score += connectionDrive * (nodeSignal + otherSignal) * CONFIG.linkAudioComboBonus;
          score += connectionDrive * farBridgeAffinity * 0.88;
          score += locality * proximity * 0.06;
          score += (Math.random() - 0.5) * 0.008;

          const key = pairKey(node, other), nx = -dy / dist, ny = dx / dist;
          const bendSeed = (node.phase + other.phase) * 0.5;

          let rec = linkMemory.get(key);
          if (!rec) rec = { a: node, b: other, strength: score, usage: score * 0.35, age: 0, phase: Math.random() * Math.PI * 2, bendSeed, lastScore: score, whiteMask: hash01(key) < 0.5 ? 1 : 0 };
          if (breakdownIntensity > 0.96) rec.whiteMask = hash01(key) < 0.5 ? 1 : 0;
          rec.a = node; rec.b = other; rec.strength = rec.strength * 0.90 + score * 0.10;
          rec.usage = rec.usage * 0.96 + (score > 0.12 ? 0.035 : 0.01);
          rec.age += 1; rec.lastScore = score;
          linkMemory.set(key, rec); seenPairs.add(key);
        }
      });

      for (const [key, rec] of linkMemory.entries()) {
        if (!seenPairs.has(key)) { rec.usage *= 0.992; rec.strength *= 0.985; }
        else { rec.usage = Math.min(1, rec.usage + 0.01 * energy); }
        rec.age += 1;
      }

      links.length = 0;
      const linkPool = [];
      for (const rec of linkMemory.values()) {
        if (!rec.a || !rec.b || rec.a.dead || rec.b.dead || rec.a.scale < 0.08 || rec.b.scale < 0.08) continue;
        const dx = rec.b.x - rec.a.x, dy = rec.b.y - rec.a.y, dist = Math.hypot(dx, dy) || 1;
        const proximity = Math.max(0, 1 - dist / maxLinkDistance);
        const visualDrive = Math.max(energy, breakdownIntensity * 0.95);
        const nx = -dy / dist, ny = dx / dist;
        const nearPriority = clampRange(CONFIG.linkNearPriority, 0.2, 3.5);
        const locality = clamp01((nearPriority - 0.2) / 3.3);
        const bridgeWeight = 1 - locality;
        const bend = Math.sin(time * 1.05 + dist * 0.018 + rec.phase + rec.bendSeed) * (dist * CONFIG.linkBendFactor) * (1 + breakdownIntensity * 1.8);
        const bridgePreserve = bridgeWeight * Math.max(0, rec.strength) * 0.18 + bridgeWeight * (1 - proximity) * 0.16;
        const liveScore = rec.strength * (0.5 + visualDrive * 0.5) + rec.usage * 0.5 + proximity * (0.10 + locality * 0.12) + bridgePreserve;
        if (liveScore <= CONFIG.linkSurvivalThreshold) continue;
        linkPool.push({ a: rec.a, b: rec.b, strength: liveScore, usage: rec.usage, age: rec.age, cx: (rec.a.x + rec.b.x) / 2 + nx * bend, cy: (rec.a.y + rec.b.y) / 2 + ny * bend });
      }

      linkPool.sort((a, b) => b.strength - a.strength);
      links.push(...linkPool.slice(0, Math.min(linkPool.length, Math.floor(CONFIG.linkBaseCount + energy * CONFIG.linkAudioBoost))));

      for (let i = beatBridges.length - 1; i >= 0; i--) {
        const b = beatBridges[i];
        b.alpha -= 0.018 * globalSpeedMult;
        b.life -= 0.018 * globalSpeedMult;
        if (b.alpha <= 0 || b.life <= 0) beatBridges.splice(i, 1);
      }
      trimEffectQueue(beatBridges, 8);

      for (let i = bursts.length - 1; i >= 0; i--) {
        const b = bursts[i];
        b.r += (b.maxR - b.r) * (0.04 + energy * 0.05 + breakdownIntensity * 0.02) * globalSpeedMult;
        b.alpha -= (b.alphaDecay || 0.017) * globalSpeedMult;
        b.spin = (b.spin || 0) + 0.02 * globalSpeedMult;
        if (b.alpha <= 0) bursts.splice(i, 1);
      }
      trimEffectQueue(bursts, 18);

      for (let i = ripples.length - 1; i >= 0; i--) {
        const r = ripples[i];
        r.r += r.speed * globalSpeedMult;
        r.alpha -= (r.decay || CONFIG.rippleDecay) * globalSpeedMult;
        if (r.alpha <= 0 || r.r > r.maxR) ripples.splice(i, 1);
      }

      floatingTexts.forEach(ft => {
        ft.y -= (0.38 * globalSpeedMult + breakdownIntensity * 1.2) * calmProfile.floatingTextRise;
        ft.alpha -= (0.012 + calmProfile.calmBoost * 0.01) * calmProfile.floatingTextAlphaDecay;
        ft.life -= (0.20 + globalSpeedMult * 0.25) * calmProfile.floatingTextLifeDecay;
      });
      floatingTexts = floatingTexts.filter(ft => ft.life > 0 && ft.alpha > 0);
      trimEffectQueue(floatingTexts, 10);

      wavefronts.forEach(wf => {
        wf.x += wf.dir * wf.speed * globalSpeedMult;
        wf.alpha -= 0.002 * globalSpeedMult;
        wf.glow -= 0.0012 * globalSpeedMult;
        wf.life -= 0.005 * globalSpeedMult;
      });
      wavefronts = wavefronts.filter(wf => wf.life > 0 && wf.alpha > 0 && wf.x > -CONFIG.wavefrontWidth * 2 && wf.x < width + CONFIG.wavefrontWidth * 2);
      trimEffectQueue(wavefronts, 14);

      currentChains.forEach(chain => {
        chain.life -= 0.013 * globalSpeedMult;
        chain.alpha -= 0.012 * globalSpeedMult;
        chain.pulse += 0.02 * globalSpeedMult;
      });
      currentChains = currentChains.filter(chain => chain.life > 0 && chain.alpha > 0 && chain.nodes && chain.nodes.length > 1);
      trimEffectQueue(currentChains, 10);

      const linkMap = new Map();
      for (const link of links) {
        if (!linkMap.has(link.a)) linkMap.set(link.a, []);
        if (!linkMap.has(link.b)) linkMap.set(link.b, []);
        linkMap.get(link.a).push(link);
        linkMap.get(link.b).push(link);
      }

      const processParticle = (p, isPulse) => {
        let needsNewLink = false;
        if (!p.from || !p.to || p.from.dead || p.to.dead) {
          needsNewLink = true;
        } else {
          const neighbors = linkMap.get(p.from) || [];
          const hasLink = neighbors.some(l => l.a === p.to || l.b === p.to);
          if (!hasLink) needsNewLink = true;
        }

        if (needsNewLink) {
          if (links.length > 0) {
            const randLink = links[(Math.random() * links.length) | 0];
            p.from = randLink.a;
            p.to = randLink.b;
            p.t = Math.random();
          } else {
            p.from = null; p.to = null; p.linkAlpha = 0;
            return;
          }
        }

        const dx = p.to.x - p.from.x, dy = p.to.y - p.from.y, dist = Math.hypot(dx, dy) || 1;
        const proximityFactor = Math.max(0, Math.min(1, 1 - dist / (420 + energy * 360 + breakdownIntensity * 180)));

        let stepSpeed = isPulse
          ? CONFIG.largePulseSpeed * (1 + energy * 4 + breakdownIntensity * 5.2 + bass * 0.8 + treble * 0.7)
          : (CONFIG.smallParticleSpeed + (energy * CONFIG.smallParticleAudioReactive)) * (0.72 + proximityFactor * 0.95) + breakdownIntensity * 0.002 + proximityFactor * 0.004;

        p.t += p.speedBase * stepSpeed * (1 + energy * 0.45 + bass * 0.25 + treble * 0.2);

        if (p.t > 1) {
          p.t = 0;
          p.from = p.to;
          const neighbors = linkMap.get(p.from) || [];
          if (neighbors.length > 0) {
            const total = neighbors.reduce((sum, l) => sum + Math.max(0.02, l.strength), 0);
            let pick = Math.random() * total, chosen = neighbors[0];
            for (const l of neighbors) {
              pick -= Math.max(0.02, l.strength);
              if (pick <= 0) { chosen = l; break; }
            }
            p.to = chosen.a === p.from ? chosen.b : chosen.a;
          } else {
            p.from = null; p.to = null; p.linkAlpha = 0; return;
          }
        }

        const nx = -dy / dist, ny = dx / dist, dir = (parseInt(p.from.id.split('-')[1], 10) % 2 === 0) ? 1 : -1;
        const bend = Math.sin(time * 1.2 + dist * 0.02) * (dist * CONFIG.linkBendFactor) * dir * (1 + breakdownIntensity * 1.8);
        const cx = (p.from.x + p.to.x) / 2 + nx * bend, cy = (p.from.y + p.to.y) / 2 + ny * bend;

        const mt = 1 - p.t;
        p.x = mt * mt * p.from.x + 2 * mt * p.t * cx + p.t * p.t * p.to.x;
        p.y = mt * mt * p.from.y + 2 * mt * p.t * cy + p.t * p.t * p.to.y;

        let strength = 0;
        const neighbors = linkMap.get(p.from) || [];
        const activeLink = neighbors.find(l => (l.a === p.from && l.b === p.to) || (l.a === p.to && l.b === p.from));
        if (activeLink) strength = activeLink.strength;

        const scaleCombo = Math.min(p.from.scale, p.to.scale);
        const vis = getLinkVisuals(p.from, p.to, strength, energy, scaleCombo);
        p.hue = vis.hue;
        p.linkAlpha = vis.alpha;
        p.scale = scaleCombo;
      };

      particles.forEach(p => processParticle(p, false));
      pulses.forEach(p => processParticle(p, true));

      time += 0.0085 * globalSpeedMult + breakdownIntensity * 0.02;

      if (breakdownIntensity > 0.08 || cssFilterPulse > 0) {
        const shakeX = (Math.random() - 0.5) * (breakdownIntensity * 24 + cssFilterPulse * 10);
        const shakeY = (Math.random() - 0.5) * (breakdownIntensity * 24 + cssFilterPulse * 10);
        const hueShift = Math.floor(cssFilterPulse * 24 + breakdownIntensity * 40);
        const contrast = 1 + breakdownIntensity * 0.9, saturate = 1 + breakdownIntensity * 1.2, sepia = breakdownIntensity * 0.45;
        const invert = breakdownIntensity > 0.84 && Math.random() > 0.45 ? ' invert(1)' : '';
        canvas.style.filter = `hue-rotate(${hueShift}deg) contrast(${contrast}) saturate(${saturate}) sepia(${sepia})${invert}`;
        canvas.style.transform = `translate(${shakeX}px, ${shakeY}px) scale(${1 + breakdownIntensity * 0.05})`;
      } else {
        canvas.style.filter = 'none';
        canvas.style.transform = 'translateZ(0)';
      }

      return { bass, vocal, treble, energy, beatPulse: Math.max(0, kickTimer / 10), snarePulse: Math.max(0, snareTimer / 7) };
    }

    function drawNotebookGrid(motion, calmProfile) {
      const calmBoost = calmProfile.calmBoost;
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      ctx.beginPath();
      const cellSize = CONFIG.gridCellSize;
      const cols = Math.ceil(width / cellSize) + 4;
      const rows = Math.ceil(height / cellSize) + 4;
      const tempo = mix(2.0, 0.42, calmBoost);
      const warpScale = mix(1.0, 0.18, calmBoost);
      const wavePower = (motion.bass * CONFIG.gridWaveIntensity + breakdownIntensity * CONFIG.gridWaveIntensity * 2.3) * warpScale;
      ctx.lineWidth = mix(1.1, 0.5, calmBoost) + breakdownIntensity * 0.55 * (1 - calmBoost);
      ctx.strokeStyle = `hsla(${(globalHueOffset * (1 - breakdownIntensity) + motion.treble * 30) % 360}, 82%, ${60 + breakdownIntensity * 28}%, ${(CONFIG.gridOpacity + motion.energy * 0.16 + breakdownIntensity * 0.22) * mix(1.0, 0.68, calmBoost)})`;

      for (let i = -2; i <= cols; i++) {
        for (let j = -2; j <= rows; j++) {
          const ox = i * cellSize, oy = j * cellSize;
          const waveX = Math.sin(oy * 0.007 + time * tempo) * wavePower;
          const waveY = Math.cos(ox * 0.007 + time * (tempo * 0.92)) * wavePower;
          if (j === -2) ctx.moveTo(ox + waveX, oy + waveY); else ctx.lineTo(ox + waveX, oy + waveY);
        }
      }
      for (let j = -2; j <= rows; j++) {
        for (let i = -2; i <= cols; i++) {
          const ox = i * cellSize, oy = j * cellSize;
          const waveX = Math.sin(oy * 0.007 + time * tempo) * wavePower;
          const waveY = Math.cos(ox * 0.007 + time * (tempo * 0.92)) * wavePower;
          if (i === -2) ctx.moveTo(ox + waveX, oy + waveY); else ctx.lineTo(ox + waveX, oy + waveY);
        }
      }
      ctx.stroke();
      ctx.restore();
    }

    function drawScene(motion) {
      const calmProfile = getCalmProfile();
      const silence = clamp01(1 - Math.max(motion.energy, breakdownIntensity * 0.95) * 3.6);
      const eqLift = motion.energy * 0.28 + motion.vocal * 0.12;
      const stereoShift = (motion.treble - motion.bass) * width * 0.03;
      const redDrop = Math.min(1, breakdownIntensity), redMix = redDrop * redDrop;

      const grad = bgCtx.createLinearGradient(0, 0, width, height);
      grad.addColorStop(0, `hsla(${(globalHueOffset + 6) % 360}, 48%, ${3.5 - redMix * 0.6}%, 1)`);
      grad.addColorStop(0.5, `hsla(${(globalHueOffset + 42) % 360}, 30%, ${5.5 - redMix * 0.9}%, 1)`);
      grad.addColorStop(1, `hsla(${(globalHueOffset + 92) % 360}, 22%, ${2.8 - redMix * 0.5}%, 1)`);
      bgCtx.fillStyle = grad;
      bgCtx.fillRect(0, 0, width, height);

      if (breakdownIntensity > 0) {
        bgCtx.fillStyle = `rgba(${90 + redMix * 150}, ${0 + redMix * 18}, ${0 + redMix * 18}, ${breakdownIntensity * 0.6})`;
        bgCtx.fillRect(0, 0, width, height);
      }
      if (breakdownIntensity > 0.72) {
        bgCtx.fillStyle = `rgba(255, 0, 0, ${breakdownIntensity * 0.12})`;
        bgCtx.fillRect(0, 0, width, height);
      }

      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = `rgba(${10 + redMix * 80}, ${2 + redMix * 6}, ${8 + redMix * 6}, ${0.26 + motion.energy * 0.08 + redMix * 0.12})`;
      ctx.fillRect(0, 0, width, height);

      const baseGlow = ctx.createRadialGradient(width * 0.5 + stereoShift * 0.15, height * 0.48, Math.min(width, height) * 0.08, width * 0.5, height * 0.5, Math.max(width, height) * 0.8);
      baseGlow.addColorStop(0, `rgba(255,255,255,${0.03 + motion.energy * 0.02})`);
      baseGlow.addColorStop(0.35, `rgba(${75 + redMix * 180}, ${120 - redMix * 120}, ${255 - redMix * 210}, ${0.03 + motion.vocal * 0.02 + redMix * 0.02})`);
      baseGlow.addColorStop(0.72, `rgba(${180 + redMix * 75}, ${70 - redMix * 60}, ${255 - redMix * 210}, ${0.015 + motion.treble * 0.018 + redMix * 0.02})`);
      baseGlow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = baseGlow;
      ctx.fillRect(0, 0, width, height);

      ctx.globalCompositeOperation = 'screen';
      backgroundOrbs.forEach((orb, index) => {
        orb.angle += orb.speed * (globalSpeedMult + 0.2) + motion.energy * 0.004;
        const regionPush = index === 0 ? -motion.bass : index === 2 ? motion.treble : motion.vocal;
        const ox = width * orb.x + Math.cos(orb.angle) * (110 + motion.bass * 160) + stereoShift * (0.5 + regionPush * 0.7);
        const oy = height * orb.y + Math.sin(orb.angle) * (110 + motion.bass * 135 + eqLift * 55);
        const radius = width * orb.r * (0.7 + motion.energy * 0.72 + eqLift * 0.22);
        const orbGrad = ctx.createRadialGradient(ox, oy, 0, ox, oy, radius);
        orbGrad.addColorStop(0, `hsla(${(globalHueOffset + orb.angle * 28 + index * 18) % 360}, 88%, 56%, ${0.03 + motion.energy * 0.04 + breakdownIntensity * 0.07})`);
        orbGrad.addColorStop(1, `hsla(${(globalHueOffset + orb.angle * 28 + index * 18) % 360}, 88%, 56%, 0)`);
        ctx.fillStyle = orbGrad;
        ctx.beginPath();
        ctx.arc(ox, oy, radius, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      wavefronts.forEach(wf => {
        const bandAlpha = Math.max(0, wf.alpha);
        const bandGlow = wf.glow + motion.energy * 0.14;
        const edgeWidth = wf.width * (0.48 + wf.thickness * 0.2);
        const bandGrad = ctx.createLinearGradient(wf.x - edgeWidth, 0, wf.x + edgeWidth, 0);
        bandGrad.addColorStop(0, `hsla(${wf.hue}, 100%, 62%, 0)`);
        bandGrad.addColorStop(0.16, `hsla(${wf.hue}, 100%, 66%, ${bandAlpha * 0.18})`);
        bandGrad.addColorStop(0.42, `hsla(${wf.hue}, 100%, ${72 + bandGlow * 8}%, ${bandAlpha * 0.7})`);
        bandGrad.addColorStop(0.5, `hsla(${wf.hue}, 100%, ${78 + bandGlow * 6}%, ${bandAlpha})`);
        bandGrad.addColorStop(0.58, `hsla(${wf.hue}, 100%, ${72 + bandGlow * 8}%, ${bandAlpha * 0.7})`);
        bandGrad.addColorStop(0.84, `hsla(${wf.hue}, 100%, 66%, ${bandAlpha * 0.18})`);
        bandGrad.addColorStop(1, `hsla(${wf.hue}, 100%, 62%, 0)`);

        ctx.fillStyle = bandGrad;
        ctx.fillRect(wf.x - edgeWidth, 0, edgeWidth * 2, height);

        const baseStrands = wf.mode === 'flash' ? 3 : wf.mode === 'filament' ? 4 : 5;
        const strandCount = baseStrands + (wf.extraStrands || 0);
        for (let s = 0; s < strandCount; s++) {
          const strandPhase = wf.phase + s * 0.85;
          const strandAmp = (wf.amp * (0.18 + s * 0.08) + motion.energy * 9) * (0.6 + wf.trail * 0.6);
          ctx.strokeStyle = `hsla(${wf.hue}, 100%, ${78 + bandGlow * 8}%, ${bandAlpha * (0.12 + s * 0.09)})`;
          ctx.lineWidth = 1 + bandGlow * 0.85 + s * 0.18;
          ctx.beginPath();
          for (let y = 0; y <= height; y += 28) {
            const yNorm = y / Math.max(height, 1);
            const drift = Math.sin(yNorm * Math.PI * 2 + strandPhase + time * (1.7 + wf.spark)) * strandAmp;
            const drift2 = Math.cos(yNorm * Math.PI * 4 + strandPhase * 0.7 + time * 0.95) * (strandAmp * 0.35);
            const x = wf.x + drift + drift2;
            if (y === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.stroke();
        }

        ctx.strokeStyle = `hsla(${wf.hue}, 100%, 90%, ${bandAlpha * 0.28})`;
        ctx.lineWidth = 1 + bandGlow * 1.2;
        ctx.beginPath();
        for (let y = 0; y <= height; y += 24) {
          const yNorm = y / Math.max(height, 1);
          const core = Math.sin(yNorm * Math.PI * 2 + wf.phase * 1.3 + time * 2.1) * (wf.amp * 0.55);
          const x = wf.x + core;
          if (y === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      });
      ctx.restore();

      drawNotebookGrid(motion, calmProfile);
      ctx.globalCompositeOperation = 'lighter';

      beatBridges.forEach(b => {
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        const grad = ctx.createLinearGradient(b.a.x, b.a.y, b.b.x, b.b.y);
        grad.addColorStop(0, `hsla(${b.hueA}, 100%, 68%, ${b.alpha * 0.15})`);
        grad.addColorStop(0.45, `hsla(${(b.hueA + b.hueB) / 2}, 100%, 75%, ${b.alpha * 0.48})`);
        grad.addColorStop(1, `hsla(${b.hueB}, 100%, 68%, 0)`);
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1.8 + motion.energy * 2.2 + breakdownIntensity * 1.4;
        ctx.beginPath();
        ctx.moveTo(b.a.x, b.a.y);
        ctx.quadraticCurveTo(b.cx, b.cy, b.b.x, b.b.y);
        ctx.stroke();
      });

      currentChains.forEach(chain => {
        const pts = chain.nodes;
        if (!pts || pts.length < 2) return;
        const hue = chain.hue;
        const pulseT = (chain.pulse + chain.phase * 0.08) % 1;
        const pulseIndex = pulseT * (pts.length - 1);
        const pulseBase = Math.floor(pulseIndex);
        const pulseNode = pts[Math.min(pts.length - 1, pulseBase)];
        const nextPulseNode = pts[Math.min(pts.length - 1, pulseBase + 1)] || pulseNode;

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        for (let i = 0; i < pts.length - 1; i++) {
          const a = pts[i];
          const b = pts[i + 1];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.hypot(dx, dy) || 1;
          const nx = -dy / dist;
          const ny = dx / dist;
          const bend = Math.sin(chain.phase + i * 0.72 + time * (1.6 + chain.speed)) * dist * 0.14;
          const cx = (a.x + b.x) * 0.5 + nx * bend;
          const cy = (a.y + b.y) * 0.5 + ny * bend;
          const segGrad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
          segGrad.addColorStop(0, `hsla(${hue}, 100%, 72%, ${chain.alpha * 0.08})`);
          segGrad.addColorStop(0.5, `hsla(${hue}, 100%, 86%, ${chain.alpha * (0.38 + i * 0.04)})`);
          segGrad.addColorStop(1, `hsla(${hue}, 100%, 72%, ${chain.alpha * 0.08})`);
          ctx.strokeStyle = segGrad;
          ctx.lineWidth = chain.thickness * (0.78 + chain.spread * 0.35) + i * 0.08;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.quadraticCurveTo(cx, cy, b.x, b.y);
          ctx.stroke();
        }

        ctx.fillStyle = `hsla(${hue}, 100%, 92%, ${chain.alpha * 0.55})`;
        ctx.beginPath();
        ctx.arc(pulseNode.x, pulseNode.y, 2.8 + chain.thickness * 0.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = `hsla(${hue}, 100%, 78%, ${chain.alpha * 0.28})`;
        ctx.beginPath();
        ctx.arc(nextPulseNode.x, nextPulseNode.y, 5.2 + chain.thickness * 0.4, 0, Math.PI * 2);
        ctx.fill();
      });

      ripples.forEach(rip => {
        const rippleAlpha = rip.alpha * calmProfile.rippleAlphaMult;
        const rippleWidth = (2 + rippleAlpha * 7) * calmProfile.rippleScaleMult;
        ctx.beginPath();
        ctx.arc(rip.x, rip.y, rip.r, 0, Math.PI * 2);
        ctx.lineWidth = rippleWidth;
        ctx.strokeStyle = `hsla(${(globalHueOffset + motion.treble * 20) % 360}, 100%, 72%, ${rippleAlpha * 0.48})`;
        ctx.stroke();
      });

      ctx.globalCompositeOperation = 'screen';
      if (flash > 0.01) {
        ctx.fillStyle = `rgba(${220 + redMix * 35}, ${20 + redMix * 25}, ${20 + redMix * 20}, ${flash * 0.14 + redMix * 0.08})`;
        ctx.fillRect(0, 0, width, height);
      }
      if (breakdownIntensity > 0.78 && Math.random() > 0.62) {
        ctx.globalCompositeOperation = 'screen';
        ctx.fillStyle = `rgba(255,255,255,${0.03 + breakdownIntensity * 0.06})`;
        ctx.fillRect(0, 0, width, height);
        ctx.globalCompositeOperation = 'source-over';
      }

      links.forEach(link => {
        const scaleCombo = Math.min(link.a.scale, link.b.scale);
        if (scaleCombo < 0.05) return;

        const vis = getLinkVisuals(link.a, link.b, link.strength, motion.energy, scaleCombo, link.whiteMask || 0);
        const whiteGlow = vis.whiteBlend;
        const idleLinkBreath = 1 + silence * CONFIG.idleLinkBreath * (0.6 + 0.4 * Math.sin(time * 0.38 + link.a.seed * 6 + link.b.seed * 4));
        const linkWidth = (CONFIG.linkBaseWidth + vis.proximity * 0.3 + link.strength * 0.8 + motion.energy * CONFIG.linkEnergyWidthBoost + breakdownIntensity * 0.8) * scaleCombo * idleLinkBreath;

        const grad = ctx.createLinearGradient(link.a.x, link.a.y, link.b.x, link.b.y);
        const edgeAlpha = Math.max(0.06, vis.alpha * (0.7 - whiteGlow * 0.18));
        const whiteAlpha = Math.min(1, vis.alpha * (0.35 + whiteGlow * 1.05));
        const paleHue = `hsla(${vis.hue}, 100%, ${78 + whiteGlow * 4}%, ${edgeAlpha})`;

        grad.addColorStop(0, paleHue);
        grad.addColorStop(0.42, whiteGlow > 0.001 ? `rgba(255,255,255,${whiteAlpha * 0.42})` : `hsla(${vis.hue}, 100%, 72%, ${vis.alpha * 0.6})`);
        grad.addColorStop(0.5, whiteGlow > 0.001 ? `rgba(255,255,255,${whiteAlpha})` : `hsla(${vis.hue}, 100%, 72%, ${vis.alpha * 0.82})`);
        grad.addColorStop(0.58, whiteGlow > 0.001 ? `rgba(255,255,255,${whiteAlpha * 0.42})` : `hsla(${vis.hue}, 100%, 72%, ${vis.alpha * 0.6})`);
        grad.addColorStop(1, paleHue);

        const baseWidth = linkWidth * (1 + whiteGlow * 0.32);

        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.strokeStyle = grad;
        ctx.lineWidth = baseWidth * 1.05;
        ctx.beginPath();
        ctx.moveTo(link.a.x, link.a.y);
        ctx.quadraticCurveTo(link.cx, link.cy, link.b.x, link.b.y);
        ctx.stroke();

        if (whiteGlow > 0.001) {
          const whiteCore = ctx.createLinearGradient(link.a.x, link.a.y, link.b.x, link.b.y);
          whiteCore.addColorStop(0, `rgba(255,255,255,0)`);
          whiteCore.addColorStop(0.22, `rgba(255,255,255,${whiteAlpha * 0.34})`);
          whiteCore.addColorStop(0.5, `rgba(255,255,255,${Math.min(1, whiteAlpha * 1.18)})`);
          whiteCore.addColorStop(0.78, `rgba(255,255,255,${whiteAlpha * 0.34})`);
          whiteCore.addColorStop(1, `rgba(255,255,255,0)`);

          ctx.strokeStyle = whiteCore;
          ctx.lineWidth = baseWidth * (0.78 + whiteGlow * 0.34);
          ctx.beginPath();
          ctx.moveTo(link.a.x, link.a.y);
          ctx.quadraticCurveTo(link.cx, link.cy, link.b.x, link.b.y);
          ctx.stroke();
        }
        ctx.restore();
      });

      pulses.forEach(p => {
        if (!p.from || !p.to) return;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4 + motion.energy * 5.5 + motion.treble * 1.4, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${p.hue}, 100%, 72%, ${p.linkAlpha * 0.5})`;
        ctx.fill();
      });

      ctx.globalAlpha = 1;
      particles.forEach(p => {
        if (!p.scale || p.scale < 0.1 || !p.from) return;

        const dx = p.to.x - p.from.x;
        const dy = p.to.y - p.from.y;
        const angle = Math.atan2(dy, dx);

        const len = (1.0 + p.linkAlpha * 2) * p.scale;
        const width = (0.2 + p.linkAlpha * 0.8) * p.scale;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(angle);

        const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, len * 1.5);
        glow.addColorStop(0.0, `hsla(${p.hue},100%,96%,${Math.min(1,p.linkAlpha*3.8)})`);
        glow.addColorStop(0.35, `hsla(${p.hue},100%,78%,${Math.min(1,p.linkAlpha*2.1)})`);
        glow.addColorStop(1.0, `hsla(${p.hue},100%,60%,0)`);

        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(0,0,len*0.8,0,Math.PI*2);
        ctx.fill();

        const grad = ctx.createLinearGradient(-len,0,len,0);
        grad.addColorStop(0,"rgba(255,255,255,0)");
        grad.addColorStop(0.18,`hsla(${p.hue},100%,74%,${p.linkAlpha*0.7})`);
        grad.addColorStop(0.50,"rgba(255,255,255,0.98)");
        grad.addColorStop(0.82,`hsla(${p.hue},100%,74%,${p.linkAlpha*0.7})`);
        grad.addColorStop(1,"rgba(255,255,255,0)");

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.ellipse(0,0,len,width,0,0,Math.PI*2);
        ctx.fill();

        ctx.restore();
      });

      if (floatingTexts.length > 0) {
        ctx.font = 'bold 11px monospace';
        ctx.textAlign = 'center';
        floatingTexts.forEach(ft => {
          ctx.fillStyle = `rgba(${180 * (1 - breakdownIntensity) + 255 * breakdownIntensity}, 255, 255, ${ft.alpha})`;
          ctx.fillText(ft.text, ft.x, ft.y);
        });
      }

      if (breakdownIntensity > 0.52 && Math.random() > 0.34) {
        const slices = 3 + ((Math.random() * 6) | 0);
        for (let i = 0; i < slices; i++) {
          const sliceY = Math.random() * height, sliceH = 8 + Math.random() * 34, shift = (Math.random() - 0.5) * 140 * breakdownIntensity;
          ctx.drawImage(canvas, 0, sliceY, width, sliceH, shift, sliceY, width, sliceH);
        }
      }
      if (breakdownIntensity > 0.8 && Math.random() > 0.55) {
        ctx.globalCompositeOperation = 'screen';
        ctx.fillStyle = `rgba(255, 0, 0, ${0.07 + breakdownIntensity * 0.2})`;
        ctx.fillRect(0, 0, width, height);
        ctx.globalCompositeOperation = 'source-over';
      }
      if (breakdownIntensity > 0.74 && Math.random() > 0.55) {
        ctx.globalCompositeOperation = 'screen';
        ctx.fillStyle = `rgba(255, 0, 0, ${0.08 + breakdownIntensity * 0.18})`;
        ctx.fillRect(0, 0, width, height);
        ctx.globalCompositeOperation = 'source-over';
      }

      if (breakdownIntensity > 0.985) {
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        const stripeCount = 10 + Math.floor((breakdownIntensity - 0.985) * 900);
        for (let i = 0; i < stripeCount; i++) {
          const t = i / stripeCount;
          const h = 3 + (i % 4) * 1.8 + breakdownIntensity * 5.5;
          const y = (t * height + Math.sin(time * 14 + i * 1.9) * (6 + breakdownIntensity * 10)) % (height + 60) - 30;
          const alpha = 0.04 + (1 - t) * 0.1 + Math.random() * 0.02;
          const red = 215 + (i % 3) * 12;
          const green = 14 + (i % 2) * 8;
          const blue = 14 + (i % 2) * 8;
          ctx.fillStyle = `rgba(${red}, ${green}, ${blue}, ${alpha})`;
          ctx.fillRect(0, y, width, h);
        }
        ctx.fillStyle = `rgba(255,255,255,${0.03 + breakdownIntensity * 0.05})`;
        for (let i = 0; i < 5; i++) {
          const y = height * (0.14 + i * 0.17) + Math.sin(time * 18 + i * 2.7) * 5;
          ctx.fillRect(0, y, width, 1);
        }
        ctx.restore();
      }

      const vignette = ctx.createRadialGradient(width * 0.5, height * 0.52, Math.min(width, height) * 0.18, width * 0.5, height * 0.52, Math.max(width, height) * 0.82);
      vignette.addColorStop(0, `rgba(255,255,255,${0.018 + motion.energy * 0.008})`);
      vignette.addColorStop(0.64, 'rgba(0,0,0,0)');
      vignette.addColorStop(1, `rgba(0,0,0,${0.44 + breakdownIntensity * 0.06})`);
      ctx.globalCompositeOperation = 'screen';
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, width, height);

      nodes.forEach(node => {
        if (node.scale < 0.01) return;
        const hue = getXColor(node.x), radius = node.radius * node.scale;
        const breath = Math.pow(
    (Math.sin(time * 3.1 + node.phase) + 1) * 0.5,
    1.6
) * (1 + motion.beatPulse * 0.65 + motion.snarePulse * 0.35);
        const nodeAudio = node.kind === 'bass' ? motion.bass : node.kind === 'vocal' ? motion.vocal : motion.treble;
        const currentRadiusMult =
    CONFIG.nodeGlowBaseMult +
    (nodeAudio * CONFIG.nodeGlowAudioBoost) +
    (breath * CONFIG.nodeGlowBreathRange);

        const glow = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, Math.max(0, radius * currentRadiusMult));
        const glowAlpha =
    (0.16 +
     node.activity * 0.27 +
     breath * 0.28 +
     motion.beatPulse * 0.12 +
     motion.snarePulse * 0.08 +
     breakdownIntensity * 0.06) * node.scale;
        glow.addColorStop(0, `hsla(${hue}, 100%, ${breakdownIntensity > 0.65 ? 58 : 62}%, ${glowAlpha})`);
        glow.addColorStop(0.65, `hsla(${hue}, 100%, ${breakdownIntensity > 0.65 ? 56 : 62}%, ${glowAlpha * 0.36})`);
        glow.addColorStop(1, `hsla(${hue}, 100%, 62%, 0)`);

        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(node.x, node.y, Math.max(0, radius * currentRadiusMult), 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = (0.78 + node.activity * 0.18) * node.scale;
        ctx.beginPath();
        ctx.arc(node.x, node.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${hue}, 18%, 96%, 0.98)`;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(node.x - radius * 0.14, node.y - radius * 0.14, radius * 0.34, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${hue}, 100%, 94%, 0.8)`;
        ctx.fill();
      });

      ctx.restore();
    }

    function animate() {
      const audioData = readAudio();
      const motion = updateScene(audioData);
      drawScene(motion);
      requestAnimationFrame(animate);
    }

    async function startAudio() {
      if (audioEnabled) return;
      btn.disabled = true;
      btn.textContent = 'Подключение...';
      try {
        mediaStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
        if (!mediaStream.getAudioTracks().length) throw new Error('No audio track found');
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        source = audioCtx.createMediaStreamSource(mediaStream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        analyser.smoothingTimeConstant = 0.2;   // было 0.45, уменьшено для более быстрой реакции
        freqData = new Uint8Array(analyser.frequencyBinCount);
        source.connect(analyser);
        audioEnabled = true;
        btn.style.display = 'none';
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Error';
      }
    }

    canvas.addEventListener('mousedown', (e) => {
      if (!audioEnabled) return;
      if (CONFIG.saluteFrequency <= 0) return;
      const rect = canvas.getBoundingClientRect(), clickX = e.clientX - rect.left, clickY = e.clientY - rect.top;
      spawnRipple(clickX, clickY, 'mouse', Math.max(0.18, longTermEnergy + 0.08), lastBass, 0.5, lastTreble);
      const mouseChain = makeCurrentChain('mouse', Math.max(0.28, longTermEnergy + 0.12), lastBass, 0.5, lastTreble, clickX, clickY);
      if (mouseChain) { currentChains.push(mouseChain); trimEffectQueue(currentChains, 10); }
      nodes.forEach(n => {
        const dx = n.x - clickX, dy = n.y - clickY, dist = Math.hypot(dx, dy);
        if (dist < 600 && dist > 0) {
          const force = Math.pow((600 - dist) / 600, 2) * 48;
          n.vx += (dx / dist) * force;
          n.vy += (dy / dist) * force;
        }
      });
      flash = Math.min(1, flash + 0.38);
    });

    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      mouse.x = e.clientX - rect.left;
      mouse.y = e.clientY - rect.top;
      mouse.active = true;
    });
    canvas.addEventListener('mouseleave', () => { mouse.active = false; });
    canvas.addEventListener('wheel', (e) => {
      if (!audioEnabled) return;
      e.preventDefault();
      breakdownTarget = clamp01(breakdownTarget + (e.deltaY > 0 ? -0.08 : 0.08));
    }, { passive: false });

    if (calmSlider) {
      calmSlider.addEventListener('input', (e) => syncCalmnessUI(e.target.value));
      calmSlider.addEventListener('change', (e) => syncCalmnessUI(e.target.value));
    }
    if (calmControl) {
      calmControl.addEventListener('pointerdown', (e) => e.stopPropagation());
      calmControl.addEventListener('mousedown', (e) => e.stopPropagation());
      calmControl.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true });
    }
    buildDevPanel();
    syncDevPanelVisibility();

    window.addEventListener('keydown', (e) => {
      if (e.key === 'F2') {
        e.preventDefault();
        toggleDevPanel();
      }
      if (e.key === 'Escape') {
        toggleDevPanel(false);
      }
    });

    if (devReset) {
      devReset.addEventListener('click', () => resetDevState());
    }

    btn.addEventListener('click', startAudio);
    window.addEventListener('resize', resize);
    resize();
    animate();
  </script>
</body>
</html>
